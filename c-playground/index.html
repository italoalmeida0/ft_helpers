      // ==========================================
      // STDIN PIPE CONSTANTS (must match worker)
      // ==========================================
      const STDIN_SAB_SIZE = 1024;
      const STDIN_STATE_OFFSET = 0;
      const STDIN_LEN_OFFSET = 4;
      const STDIN_DATA_OFFSET = 8;
      const STDIN_DATA_CAPACITY = STDIN_SAB_SIZE - STDIN_DATA_OFFSET;

      const STDIN_STATE_IDLE = 0;
      const STDIN_STATE_DATA_READY = 1;
      const STDIN_STATE_ACK = 2;
      const STDIN_STATE_EOF = 3;
      const STDIN_STATE_CANCEL = 4;

      // ==========================================
      // STDIN PIPE WRITER (main thread side)
      // Uses polling (no Atomics.wait on main thread)
      // ==========================================
      class StdinPipeWriter {
        constructor(sab) {
          this.sab = sab;
          this.int32 = new Int32Array(sab);
          this.u8 = new Uint8Array(sab);
          this._writeQueue = [];
          this._writing = false;
        }

        // Async write — enqueues data and processes it
        async write(str) {
          if (!str || str.length === 0) return;
          this._writeQueue.push(str);
          if (this._writing) return; // Already processing queue
          this._writing = true;
          try {
            while (this._writeQueue.length > 0) {
              const chunk = this._writeQueue.shift();
              await this._writeChunk(chunk);
            }
          } finally {
            this._writing = false;
          }
        }

        async _writeChunk(str) {
          // Encode the string to UTF-8 bytes first
          const encoder = new TextEncoder();
          const bytes = encoder.encode(str);
          let offset = 0;

          while (offset < bytes.length) {
            // Wait until worker is ready for data
            while (true) {
              const state = Atomics.load(this.int32, STDIN_STATE_OFFSET / 4);
              if (state === STDIN_STATE_IDLE || state === STDIN_STATE_ACK)
                break;
              if (state === STDIN_STATE_EOF || state === STDIN_STATE_CANCEL)
                return;
              await new Promise((r) => setTimeout(r, 2));
            }

            // Write chunk
            const remaining = bytes.length - offset;
            const chunkLen = Math.min(remaining, STDIN_DATA_CAPACITY);

            for (let i = 0; i < chunkLen; i++) {
              this.u8[STDIN_DATA_OFFSET + i] = bytes[offset + i];
            }
            offset += chunkLen;

            Atomics.store(this.int32, STDIN_LEN_OFFSET / 4, chunkLen);
            Atomics.store(
              this.int32,
              STDIN_STATE_OFFSET / 4,
              STDIN_STATE_DATA_READY,
            );
            Atomics.notify(this.int32, STDIN_STATE_OFFSET / 4);

            // Wait for ACK
            while (true) {
              const state = Atomics.load(this.int32, STDIN_STATE_OFFSET / 4);
              if (state === STDIN_STATE_ACK) break;
              if (state === STDIN_STATE_EOF || state === STDIN_STATE_CANCEL)
                return;
              await new Promise((r) => setTimeout(r, 2));
            }

            // Reset to IDLE
            Atomics.store(this.int32, STDIN_STATE_OFFSET / 4, STDIN_STATE_IDLE);
          }
        }

        async writeEOF() {
          // Wait until worker is idle before signaling EOF.
          // Without this, we can corrupt the SAB state if we set EOF
          // while the worker is in the middle of a read (DATA_READY state).
          while (true) {
            const state = Atomics.load(this.int32, STDIN_STATE_OFFSET / 4);
            if (state === STDIN_STATE_IDLE || state === STDIN_STATE_ACK) break;
            if (state === STDIN_STATE_EOF || state === STDIN_STATE_CANCEL)
              return;
            await new Promise((r) => setTimeout(r, 2));
          }
          Atomics.store(this.int32, STDIN_STATE_OFFSET / 4, STDIN_STATE_EOF);
          Atomics.notify(this.int32, STDIN_STATE_OFFSET / 4);
        }

        cancel() {
          Atomics.store(this.int32, STDIN_STATE_OFFSET / 4, STDIN_STATE_CANCEL);
          Atomics.notify(this.int32, STDIN_STATE_OFFSET / 4);
        }

        reset() {
          this._writeQueue = [];
          this._writing = false;
          Atomics.store(this.int32, STDIN_STATE_OFFSET / 4, STDIN_STATE_IDLE);
          Atomics.store(this.int32, STDIN_LEN_OFFSET / 4, 0);
        }
      }

      // ==========================================
      // CHECK SharedArrayBuffer AVAILABILITY
      // ==========================================
      function isSABAvailable() {
        try {
          new SharedArrayBuffer(16);
          return true;
        } catch (e) {
          return false;
        }
      }

      // ==========================================
      // WORKER API
      // ==========================================
      class CompilerWorkerAPI {
        constructor(onWrite, binaries) {
          this.nextResponseId = 0;
          this.responseCBs = new Map();
          this.onWrite = onWrite;
          this.binaries = binaries;
          this._initWorker();
        }

        _initWorker() {
          this.worker = new Worker("compiler-worker.js");
          const channel = new MessageChannel();
          this.port = channel.port1;
          this.port.onmessage = this.onmessage.bind(this);

          const remotePort = channel.port2;
          this.worker.postMessage(
            {
              id: "constructor",
              data: { port: remotePort, binaries: this.binaries },
            },
            [remotePort],
          );
        }

        terminate() {
          this.worker.terminate();
        }

        // Force-terminate a stuck worker (e.g., infinite loop) and recreate it.
        // The pending compileAndRun promise will never resolve, so callers
        // should handle the state transition themselves before calling this.
        forceRestart() {
          this.worker.terminate();
          this.responseCBs.clear();
          this._initWorker();
        }

        async runAsync(id, options, transferables) {
          const responseId = this.nextResponseId++;
          const responsePromise = new Promise((resolve, reject) => {
            this.responseCBs.set(responseId, { resolve, reject });
          });
          this.port.postMessage(
            { id, responseId, data: options },
            transferables || [],
          );
          return await responsePromise;
        }

        async compileAndRun(code, args, stdin, stdinSAB) {
          const data = { code, args, stdin };
          if (stdinSAB) {
            data.stdinSAB = stdinSAB;
            // SharedArrayBuffer is SHARED, not transferred — both threads keep access
            return this.runAsync("compileAndRun", data);
          }
          return this.runAsync("compileAndRun", data);
        }

        cancelRun() {
          this.port.postMessage({ id: "cancelRun" });
        }

        stdinEOF() {
          this.port.postMessage({ id: "stdinEOF" });
        }

        onmessage(event) {
          switch (event.data.id) {
            case "write":
              if (this.onWrite) this.onWrite(event.data.data);
              break;

            case "runAsync": {
              const responseId = event.data.responseId;
              const promise = this.responseCBs.get(responseId);
              if (promise) {
                this.responseCBs.delete(responseId);
                promise.resolve(event.data.data);
              }
              break;
            }
          }
        }
      }

      async function loadWasmClangBinaries() {
        const files = [
          { name: "clang", url: "../clang" },
          { name: "lld", url: "../lld" },
          { name: "memfs", url: "../memfs" },
          { name: "sysroot", url: "../sysroot.tar" },
        ];
        const binaries = {};
        for (const f of files) {
          const buf = await new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open("GET", f.url + "?t=" + Date.now(), true);
            xhr.responseType = "arraybuffer";
            xhr.onload = () => {
              if (xhr.status === 200) {
                resolve(xhr.response);
              } else {
                reject(new Error(`Failed to load ${f.url}: ${xhr.status}`));
              }
            };
            xhr.onerror = () =>
              reject(new Error(`Network error loading ${f.url}`));
            xhr.send();
          });
          binaries[f.name] = buf;
        }
        return binaries;
      }

      // ==========================================
      // ICON SYSTEM
      // ==========================================
      const svgCache = new Map();
      const svgSignals = new Map();

      function getIconUrl(name, color = "e4e4e7", size = 24) {
        return `https://api.iconify.design/material-symbols/${name}.svg?color=%23${color}&height=${size}`;
      }

      function fetchIcon(name, color = "e4e4e7", size = 24) {
        const key = `${name}|${color}|${size}`;
        if (svgCache.has(key)) return svgCache.get(key);
        if (svgSignals.has(key)) return svgSignals.get(key);

        const [svg, setSvg] = createSignal("");
        svgSignals.set(key, svg);

        fetch(getIconUrl(name, color, size))
          .then((r) => r.text())
          .then((text) => {
            svgCache.set(key, text);
            setSvg(text);
            svgSignals.delete(key);
          })
          .catch(() => {});

        return svg();
      }

      const Icon = (props) => {
        const name = () => props.name;
        const color = () => props.color || "e4e4e7";
        const size = () => props.size || 24;
        const key = () => `${name()}|${color()}|${size()}`;

        const svgContent = createMemo(() => {
          const k = key();
          if (svgCache.has(k)) return svgCache.get(k);
          fetchIcon(name(), color(), size());
          const sig = svgSignals.get(k);
          return sig ? sig() : "";
        });

        return (
          <Show when={svgContent()}>
            <div
              innerHTML={svgContent()}
              class={`inline-flex items-center justify-center ${props.class || ""}`}
              style={{ width: `${size()}px`, height: `${size()}px` }}
            />
          </Show>
        );
      };

      // ==========================================
      // MAIN APPLICATION COMPONENT
      // ==========================================
      function App() {
        const [appState, setAppState] = createSignal("IDLE"); // IDLE | COMPILING | RUNNING
        const [statusMessage, setStatusMessage] = createSignal("");
        const [executionError, setExecutionError] = createSignal(null);
        const [sabAvailable] = createSignal(isSABAvailable());
        const [compilerReady, setCompilerReady] = createSignal(false);

        let codeEditorRef;
        let cmInstance;
        let saveTimeout;
        let terminalRef;
        let termInstance;
        let fitAddon;
        let compilerApi;
        let stdinSAB = null;
        let stdinPipeWriter = null;
        let terminalDataDisposable = null;

        const defaultCode = `// Welcome to the C Playground!
// Compile and run C code directly in your browser.
// Supports argv arguments and stdin input.

#include <stdio.h>

int main()
{
    printf("Hello World");

    return 0;
}
`;

        const LOCAL_STORAGE_KEY = "c_playground_code";

        // ==========================================
        // SHARE VIA URL HASH (no backend)
        // Uses gzip + base64url encoding in the hash
        // ==========================================
        const compressToHash = async (code) => {
          const blob = new Blob([code]);
          const cs = new CompressionStream("gzip");
          const stream = blob.stream().pipeThrough(cs);
          const compressed = await new Response(stream).arrayBuffer();
          const bytes = new Uint8Array(compressed);
          let binary = "";
          for (let i = 0; i < bytes.length; i++) {
            binary += String.fromCharCode(bytes[i]);
          }
          return btoa(binary)
            .replace(/\+/g, "-")
            .replace(/\//g, "_")
            .replace(/=+$/, "");
        };

        const decompressFromHash = async (hashStr) => {
          const base64 = hashStr.replace(/-/g, "+").replace(/_/g, "/");
          const padded = base64 + "=".repeat((4 - (base64.length % 4)) % 4);
          const binary = atob(padded);
          const bytes = new Uint8Array(binary.length);
          for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
          }
          const blob = new Blob([bytes]);
          const ds = new DecompressionStream("gzip");
          const stream = blob.stream().pipeThrough(ds);
          return await new Response(stream).text();
        };

        const loadFromHash = async () => {
          const hash = window.location.hash.slice(1);
          if (!hash) return null;
          try {
            return await decompressFromHash(hash);
          } catch (e) {
            console.warn("Failed to decode hash:", e);
            return null;
          }
        };

        const shareCode = async () => {
          try {
            const compressed = await compressToHash(scriptCode());
            const url =
              window.location.origin +
              window.location.pathname +
              "#" +
              compressed;
            await navigator.clipboard.writeText(url);
            setShareStatus("copied");
            setTimeout(() => setShareStatus("idle"), 2000);
          } catch (e) {
            // Fallback: change the URL hash directly
            const compressed = await compressToHash(scriptCode());
            window.location.hash = compressed;
            setShareStatus("copied");
            setTimeout(() => setShareStatus("idle"), 2000);
          }
        };

        const [shareStatus, setShareStatus] = createSignal("idle"); // idle | copied

        // ==========================================
        // MODE 42 STATE
        // ==========================================
        const loadMode42Saved = () => {
          try {
            return localStorage.getItem("c_playground_mode42") === "1";

        const loadFilenameSaved = () => {

        const [mode42, setMode42] = createSignal(loadMode42Saved());
        const [mode42StatusState, setMode42StatusState] = createSignal("ready");
        const [mode42StatusText, setMode42StatusText] = createSignal("");
        const [mode42ErrorCount, setMode42ErrorCount] = createSignal(0);
        const [mode42ErrorColor, setMode42ErrorColor] = createSignal("#52525b");
        const [mode42LintResults, setMode42LintResults] = createSignal([]);
        const [mode42LintPanelVisible, setMode42LintPanelVisible] =
          createSignal(false);
        const [mode42LintPanelHeight, setMode42LintPanelHeight] =
          createSignal(0);
        const [mode42ModalVisible, setMode42ModalVisible] = createSignal(false);
        const [mode42ModalUser, setMode42ModalUser] = createSignal("");
        const [mode42ModalEmail, setMode42ModalEmail] = createSignal("");
        const [codeFilename, setCodeFilename] =
          createSignal(loadFilenameSaved());
        const [mode42FormatterReady, setMode42FormatterReady] =
          createSignal(false);
        const [editingFilename, setEditingFilename] = createSignal(false);

        let pyodide42 = null;
        let mode42Ready = false;
        let mode42LinterRef = null;
        const mode42LintCompartment = new Compartment();
        const mode42LineCountCompartment = new Compartment();

        const set42Status = (state, text) => {
          setMode42StatusState(state);
          setMode42StatusText(text);
        };

        const update42ErrorCount = (count) => {
          setMode42ErrorCount(count);
          setMode42ErrorColor(count > 0 ? "#f38ba8" : "#52525b");
        };

        const forceLint42 = () => {
          if (!cmInstance || !mode42Ready) return;
          cmInstance.dispatch({
            changes: {
              from: 0,
              to: cmInstance.state.doc.length,
              insert: cmInstance.state.doc.toString(),
            },
          });
        };

        // ==========================================
        // NORMINETTE LINTER (only active in mode 42)
        // ==========================================
        const createNorminetteLinter = () =>
          linter(
            async (view) => {
              if (!mode42Ready || !pyodide42) return [];
              const code = view.state.doc.toString();
              if (!code.trim()) return [];
              const fn = codeFilename() || "main.c";
              try {
                pyodide42.globals.set("source_code", code);
                pyodide42.globals.set("file_name", fn);
                const resultJson = await pyodide42.runPython(
                  "run_norminette(source_code, file_name)",
                );
                const result = JSON.parse(resultJson);
                const fileInfo = result.files[0];
                const lintErrors = [];
                const diagnostics = [];
                for (const err of fileInfo.errors) {
                  const hl = err.highlights[0];
                  if (!hl) continue;
                  const lineno = Math.max(
                    1,
                    Math.min(hl.lineno, view.state.doc.lines),
                  );
                  const line = view.state.doc.line(lineno);
                  const from = line.from + Math.max(0, hl.column - 1);
                  const to = Math.min(from + (hl.length || 1), line.to);
                  diagnostics.push({
                    from,
                    to,
                    severity: err.level === "Notice" ? "warning" : "error",
                    message: `${err.name}: ${err.text}`,
                    source: "norminette",
                  });
                  lintErrors.push({
                    lineno: hl.lineno,
                    column: hl.column,
                    level: err.level,
                    name: err.name,
                    text: err.text,
                  });
                }
                if (fileInfo.status === "OK") {
                  set42Status("ok", "No errors");
                  update42ErrorCount(0);
                } else {
                  set42Status(
                    "has-errors",
                    `${fileInfo.errors.length} error(s)`,
                  );
                  update42ErrorCount(fileInfo.errors.length);
                }
                // Update lint panel
                if (lintErrors.length === 0) {
                  setMode42LintPanelVisible(false);
                  setMode42LintPanelHeight(0);
                } else {
                  setMode42LintPanelVisible(true);
                  setMode42LintPanelHeight(
                    Math.min(200, Math.max(80, lintErrors.length * 30)),
                  );
                }
                setMode42LintResults(lintErrors);
                return diagnostics;
              } catch (err) {
                console.error("Norminette lint error:", err);
                return [];
              }
            },
            { delay: 750 },
          );

        // ==========================================
        // FORMAT CODE (mode 42)
        // ==========================================
        const formatCode42 = async () => {
          if (!mode42Ready || !mode42FormatterReady() || !cmInstance) return;
          const code = cmInstance.state.doc.toString();
          if (!code.trim()) return;
          try {
            set42Status("loading", "Formatting...");
            const clangFormatted = window.__ftWasmFormat(
              code,
              codeFilename() || "main.c",
            );
            pyodide42.globals.set("__ft_code", clangFormatted);
            const pyFormatted = await pyodide42.runPython("run_all(__ft_code)");
            if (pyFormatted && pyFormatted !== code) {
              cmInstance.dispatch({
                changes: {
                  from: 0,
                  to: cmInstance.state.doc.length,
                  insert: pyFormatted,
                },
              });
              set42Status("ready", "Formatted");
            } else {
              set42Status("ready", "Already formatted");
            }
          } catch (err) {
            console.error("Formatter error:", err);
            set42Status("error", "Format error: " + err.message);
          }
        };

        // ==========================================
        // 42 HEADER MODAL
        // ==========================================
        const loadHeaderSettings42 = () => {
          try {
            setMode42ModalUser(localStorage.getItem(LS_USER_KEY) || "");
            setMode42ModalEmail(localStorage.getItem(LS_EMAIL_KEY) || "");
          } catch (e) {}
        };

        const openHeaderModal42 = () => {
          loadHeaderSettings42();
          setMode42ModalVisible(true);
        };

        const closeHeaderModal42 = () => {
          setMode42ModalVisible(false);
        };

        const insertHeader42 = () => {
          const user = mode42ModalUser().trim();
          const email = mode42ModalEmail().trim();
          if (!user || !email) {
            set42Status("error", "Please fill in both username and email");
            return;
          }
          try {
            localStorage.setItem(LS_USER_KEY, user);
            localStorage.setItem(LS_EMAIL_KEY, email);
          } catch (e) {}
          setMode42ModalVisible(false);
          const fn = codeFilename().trim() || "main.c";
          const currentCode = cmInstance.state.doc.toString();
          const newCode = insert42HeaderIntoCode(currentCode, fn, user, email);
          cmInstance.dispatch({
            changes: {
              from: 0,
              to: cmInstance.state.doc.length,
              insert: newCode,
            },
          });
          set42Status("ready", "42 header inserted");
        };

        const onLintItemClick42 = (line, col) => {
          if (cmInstance && line > 0) {
            const pos =
              cmInstance.state.doc.line(
                Math.min(line, cmInstance.state.doc.lines),
              ).from + Math.max(0, col - 1);
            cmInstance.dispatch({
              selection: { anchor: pos },
              scrollIntoView: true,
            });
            cmInstance.focus();
          }
        };

        // ==========================================
        // TOGGLE MODE 42
        // ==========================================
        const toggleMode42 = async () => {
          const next = !mode42();
          setMode42(next);
          try {
            localStorage.setItem("c_playground_mode42", next ? "1" : "0");
          } catch (e) {}

          if (next) {
            // Activate Mode 42: add lint + line count extensions
            if (cmInstance) {
              mode42LinterRef = createNorminetteLinter();
              cmInstance.dispatch({
                effects: [
                  mode42LintCompartment.reconfigure([
                    mode42LinterRef,
                    lintGutter(),
                  ]),
                  mode42LineCountCompartment.reconfigure(functionLineCount()),
                ],
              });
            }

            // Load Pyodide if not loaded yet
            if (!pyodide42) {
              set42Status("loading", "Loading norminette...");
              try {
                const result = await initPyodide42((state, text) =>
                  set42Status(state, text),
                );
                pyodide42 = result.pyodide;
                mode42Ready = true;
                setMode42FormatterReady(true);
                set42Status("ready", "Norminette + formatter loaded");
                update42ErrorCount(0);
                forceLint42();
              } catch (err) {
                set42Status("error", "Failed to load: " + err.message);
                console.error("Mode 42 loading error:", err);
              }
            } else {
              // Already loaded, just re-enable
              mode42Ready = true;
              set42Status("ready", "Norminette active");
              forceLint42();
            }
          } else {
            // Deactivate Mode 42: remove lint + line count extensions
            mode42Ready = false;
            setMode42LintPanelVisible(false);
            setMode42LintPanelHeight(0);
            setMode42StatusText("");
            if (cmInstance) {
              cmInstance.dispatch({
                effects: [
                  mode42LintCompartment.reconfigure([]),
                  mode42LineCountCompartment.reconfigure([]),
                ],
              });
            }
          }
        };

        const loadSavedCode = () => {
          try {
            const saved = localStorage.getItem(LOCAL_STORAGE_KEY);
            return saved !== null ? saved : defaultCode;
          } catch (e) {
            return defaultCode;
          }
        };

        const [scriptCode, setScriptCode] = createSignal(loadSavedCode());
        const [argvInput, setArgvInput] = createSignal("hello 42 world");
        const [stdinInput, setStdinInput] = createSignal("");
        const [activeTab, setActiveTab] = createSignal("terminal"); // 'terminal' | 'stdin'

        // Line buffer for canonical (cooked) mode editing
        let _lineBuffer = "";

        // Handle terminal input during interactive mode
        // Implements canonical mode: line editing (backspace) + send on Enter
        const handleTerminalData = (data) => {
          if (appState() !== "RUNNING" || !stdinPipeWriter) return;

          for (let i = 0; i < data.length; i++) {
            const code = data.charCodeAt(i);

            // Ctrl+C (0x03) - terminate program
            if (code === 3) {
              termInstance.writeln("^C");
              _lineBuffer = "";
              stopProgram();
              return;
            }

            // Ctrl+D (0x04) - send EOF
            if (code === 4) {
              termInstance.writeln("^D");
              _lineBuffer = "";
              stdinPipeWriter.writeEOF().catch(() => {});
              return;
            }

            // Ctrl+U (0x15) - kill line (erase entire line)
            if (code === 0x15) {
              if (_lineBuffer.length > 0) {
                // Move cursor back, erase with spaces, move cursor back again
                termInstance.write("\b \b".repeat(_lineBuffer.length));
                _lineBuffer = "";
              }
              continue;
            }

            // Ctrl+W (0x17) - delete word backwards
            if (code === 0x17) {
              // Trim trailing spaces, then find last word boundary
              let trimmed = _lineBuffer.replace(/\s+$/, "");
              const deleteCount =
                _lineBuffer.length -
                trimmed.length +
                (trimmed.match(/\s\S*$/)
                  ? trimmed.match(/\s\S*$/)[0].length
                  : trimmed.length);
              if (deleteCount > 0) {
                termInstance.write("\b \b".repeat(deleteCount));
                _lineBuffer = _lineBuffer.substring(
                  0,
                  _lineBuffer.length - deleteCount,
                );
              }
              continue;
            }

            // Backspace (0x7F) or DEL (0x08) - delete last character
            if (code === 0x7f || code === 0x08) {
              if (_lineBuffer.length > 0) {
                // Remove last character from buffer
                // Handle multi-byte: remove last code point
                _lineBuffer = [..._lineBuffer].slice(0, -1).join("");
                // Erase on terminal: move back, write space, move back
                termInstance.write("\b \b");
              }
              continue;
            }

            // Enter / Return (0x0D) - flush line buffer to program
            if (code === 0x0d) {
              const line = _lineBuffer + "\n";
              _lineBuffer = "";
              // Echo newline to terminal
              termInstance.write("\r\n");
              // Send the complete line to the program
              stdinPipeWriter.write(line).catch(() => {});
              continue;
            }

            // Regular printable character - add to line buffer and echo
            _lineBuffer += data[i];
            termInstance.write(data[i]);
          }
        };

        onMount(async () => {
          // Check for shared code in URL hash
          const hashCode = await loadFromHash();
          if (hashCode) {
            setScriptCode(hashCode);
            if (cmInstance) {
              // Will be set after CM init below
            }
          }

          // Initialize CodeMirror 6
          if (codeEditorRef) {
            cmInstance = new EditorView({
              doc: scriptCode(),
              extensions: [
                basicSetup,
                keymap.of([
                  {
                    key: "Tab",
                    run: insertTab,
                  },
                  {
                    key: "Shift-Tab",
                    run: indentLess,
                  },
                ]),
                indentationMarkers(),
                cpp(),
                vscodeDark,
                mode42LintCompartment.of([]),
                mode42LineCountCompartment.of([]),
                Prec.highest(
                  keymap.of([
                    {
                      key: "Mod-s",
                      run: () => ({}),
                    },
                  ]),
                ),
                EditorView.updateListener.of((update) => {
                  if (update.docChanged) {
                    const newCode = update.state.doc.toString();
                    setScriptCode(newCode);
                    setExecutionError(null);

                    // Debounce save to localStorage (1 second)
                    if (saveTimeout) clearTimeout(saveTimeout);
                    saveTimeout = setTimeout(() => {
                      try {
                        localStorage.setItem(LOCAL_STORAGE_KEY, newCode);
                      } catch (e) {}
                    }, 1000);
                  }
                }),
              ],
              parent: codeEditorRef,
            });
          }

          // Initialize xterm.js
          termInstance = new Terminal({
            theme: { background: "#09090b", foreground: "#d4d4d8" },
            fontFamily: "'Courier New', Courier, monospace",
            fontSize: 13,
            cursorBlink: true,
            convertEol: true,
            allowProposedApi: true,
            scrollback: 5000,
          });
          fitAddon = new FitAddon();
          termInstance.loadAddon(fitAddon);
          termInstance.loadAddon(new UnicodeGraphemesAddon());
          termInstance.loadAddon(new WebglAddon());

          if (terminalRef) {
            termInstance.open(terminalRef);
            requestAnimationFrame(() => {
              try {
                fitAddon.fit();
              } catch (e) {}
            });

            const resizeObserver = new ResizeObserver(() => {
              try {
                fitAddon.fit();
              } catch (e) {}
            });
            resizeObserver.observe(terminalRef);
          }

          termInstance.writeln("\x1b[33mLoading compiler...\x1b[0m\n");
          try {
            const binaries = await loadWasmClangBinaries();
            compilerApi = new CompilerWorkerAPI((data) => {
              if (termInstance) termInstance.write(data);
            }, binaries);
            termInstance.clear();
            termInstance.writeln(
              "\x1b[36mCompiler loaded successfully.\x1b[0m",
            );
            setCompilerReady(true);
          } catch (err) {
            termInstance.clear();
            termInstance.writeln(
              `\x1b[31mFailed to initialize compiler: ${err.message}\x1b[0m`,
            );
          }

          // Auto-activate Mode 42 if it was saved in localStorage
          if (mode42()) {
            setMode42(false); // Reset so toggleMode42 will set it to true
            // Use setTimeout to ensure CM is fully initialized before activating
            setTimeout(() => toggleMode42(), 100);
          }
        });

        onCleanup(() => {
          if (compilerApi) compilerApi.terminate();
          if (terminalDataDisposable) terminalDataDisposable.dispose();
        });

        const stopProgram = () => {
          if (appState() !== "RUNNING" && appState() !== "COMPILING") return;

          // First try graceful cancellation via stdin pipe
          if (stdinPipeWriter) {
            stdinPipeWriter.cancel();
          }
          compilerApi.cancelRun();

          // For CPU-bound infinite loops (e.g., while(1)), cancelRun() won't
          // work because the WASM code never reads stdin. We need to force-
          // terminate the worker and recreate it.
          compilerApi.forceRestart();

          // Clean up state since the pending compileAndRun promise will never resolve
          if (terminalDataDisposable) {
            terminalDataDisposable.dispose();
            terminalDataDisposable = null;
          }
          stdinPipeWriter = null;
          stdinSAB = null;

          setAppState("IDLE");
          setStatusMessage("");
          if (termInstance) {
            termInstance.writeln("\n\x1b[33mProgram stopped by user.\x1b[0m");
          }
        };

        const runProgram = async () => {
          if (appState() === "COMPILING" || appState() === "RUNNING") return;
          if (!compilerReady()) return;

          setAppState("COMPILING");
          setExecutionError(null);
          termInstance.clear();

          // Detach any previous terminal input listener
          if (terminalDataDisposable) {
            terminalDataDisposable.dispose();
            terminalDataDisposable = null;
          }

          try {
            const args = argvInput()
              .split(/\s+/)
              .map((s) => s.trim())
              .filter((s) => s.length > 0);

            setStatusMessage("Compiling...");
            termInstance.writeln("\x1b[34mCompiling and running...\x1b[0m\n");

            // Create SAB for interactive stdin if available
            let sab = null;
            if (sabAvailable()) {
              sab = new SharedArrayBuffer(STDIN_SAB_SIZE);
              stdinSAB = sab;
              stdinPipeWriter = new StdinPipeWriter(sab);
              stdinPipeWriter.reset();
              _lineBuffer = "";
            }

            // Set up terminal input listener for interactive mode
            if (sab) {
              terminalDataDisposable = termInstance.onData(handleTerminalData);
            }

            setAppState("RUNNING");
            setStatusMessage("Running...");

            const result = await compilerApi.compileAndRun(
              scriptCode(),
              args,
              stdinInput(),
              sab,
            );

            if (result.error) {
              throw new Error(result.error);
            }

            termInstance.writeln("\n\x1b[32mProgram finished.\x1b[0m");
          } catch (err) {
            if (err.message !== "Program terminated by user") {
              setExecutionError(err.message);
              termInstance.writeln(`\n\x1b[31m${err.message}\x1b[0m`);
            }
          } finally {
            setAppState("IDLE");
            setStatusMessage("");

            // Clean up terminal input listener
            if (terminalDataDisposable) {
              terminalDataDisposable.dispose();
              terminalDataDisposable = null;
            }
            stdinPipeWriter = null;
            stdinSAB = null;
          }
        };

        const resetCode = () => {
          if (
            confirm(
              "Reset code to default? This will overwrite your current code.",
            )
          ) {
            if (cmInstance) {
              cmInstance.dispatch({
                changes: {
                  from: 0,
                  to: cmInstance.state.doc.length,
                  insert: defaultCode,
                },
              });
              setScriptCode(defaultCode);
            }
            setCodeFilename("main.c");
            forceLint();
            try {
              localStorage.removeItem(LOCAL_STORAGE_KEY);
              localStorage.setItem("c_playground_filename", "main.c");
            } catch (e) {}
          }
        };

        const forceLint = () => {
          if (!cmInstance) return;
          cmInstance.dispatch({
            changes: {
              from: 0,
              to: cmInstance.state.doc.length,
              insert: cmInstance.state.doc.toString(),
            },
          });
        };

        return (
          <div class="h-full flex flex-col overflow-hidden">
            {/* Header */}
            <header class="bg-[#18181b] border-b border-[#27272a] px-3 py-2 md:px-4 md:py-3 flex items-center justify-between shrink-0 gap-2">
              <div class="flex items-center space-x-2 md:space-x-3 min-w-0">
                <div class="bg-[#064e3b] p-1.5 rounded-lg flex items-center justify-center shrink-0">
                  <Icon name="code" color="34d399" size={20} />
                </div>
                <div class="min-w-0">
                  <h1 class="text-sm md:text-lg font-bold text-[#d4d4d8] truncate">
                    C Playground
                  </h1>
                  <p class="text-[10px] md:text-xs text-[#52525b] hidden sm:block">
                    Compile & run C in your browser
                  </p>
                </div>
              </div>

              <div class="flex items-center space-x-1 md:space-x-2 shrink-0">
                {/* Mode 42 Toggle */}
                <div
                  class="mode42-toggle"
                  onClick={toggleMode42}
                  title={
                    mode42()
                      ? "Mode 42 School ON — click to disable"
                      : "Mode 42 OFF — click to enable norminette + formatter"
                  }
                >
                  <span
                    class={`text-[10px] font-bold uppercase tracking-wider ${mode42() ? "text-orange-400" : "text-[#52525b]"}`}
                  >
                    42 School
                  </span>
                  <div
                    class={`mode42-toggle-track ${mode42() ? "active" : ""}`}
                  >
                    <div class="mode42-toggle-thumb"></div>
                  </div>
                </div>

                <button
                  onClick={shareCode}
                  class={`p-2 rounded-lg transition-colors flex ${shareStatus() === "copied" ? "bg-emerald-600 text-white" : "bg-[#27272a] hover:bg-[#3f3f46] text-[#a1a1aa]"}`}
                  title={
                    shareStatus() === "copied" ? "Link copied!" : "Share Code"
                  }
                >
                  <Show
                    when={shareStatus() === "copied"}
                    fallback={<Icon name="share" size={18} />}
                  >
                    <Icon name="check" color="ffffff" size={18} />
                  </Show>
                </button>
                <button
                  onClick={resetCode}
                  disabled={
                    appState() === "COMPILING" || appState() === "RUNNING"
                  }
                  class="p-2 rounded-lg bg-[#27272a] hover:bg-[#3f3f46] text-[#a1a1aa] transition-colors flex disabled:opacity-50"
                  title="Reset Code"
                >
                  <Icon name="restart-alt" size={18} />
                </button>
                <Show when={appState() === "RUNNING"}>
                  <button
                    onClick={stopProgram}
                    class="flex items-center rounded-lg transition-colors p-2 bg-red-600 hover:bg-red-500 text-white shrink-0"
                    title="Stop Program (Ctrl+C)"
                  >
                    <Icon name="stop" color="ffffff" size={16} />
                  </button>
                </Show>
                <Show when={appState() !== "RUNNING"}>
                  <button
                    onClick={runProgram}
                    disabled={appState() === "COMPILING" || !compilerReady()}
                    class="flex items-center rounded-lg transition-colors p-2 disabled:opacity-50 bg-emerald-600 hover:bg-emerald-500 text-white shrink-0"
                    title={
                      !compilerReady() ? "Loading compiler..." : "Run Program"
                    }
                  >
                    <Show
                      when={appState() === "COMPILING"}
                      fallback={
                        <Icon name="play-arrow" color="ffffff" size={16} />
                      }
                    >
                      <div
                        class="spinner"
                        style={{
                          width: "14px",
                          height: "14px",
                          border: "2px solid rgba(255,255,255,0.2)",
                          "border-left-color": "#fff",
                        }}
                      ></div>
                    </Show>
                  </button>
                </Show>
              </div>
            </header>

            {/* Main Content */}
            <div class="flex-1 flex flex-col md:flex-row overflow-hidden min-h-0">
              {/* Editor */}
              <div class="flex-1 flex flex-col min-h-0 min-w-0">
                <div class="flex items-center px-3 py-1.5 md:px-4 md:py-2 bg-[#09090b] border-b border-[#27272a] shrink-0 gap-1">
                  <Show when={!editingFilename()}>
                    <span
                      class="text-[10px] md:text-xs font-semibold text-[#52525b] uppercase tracking-wider editable-filename"
                      onClick={() => setEditingFilename(true)}
                    >
                      {codeFilename()}
                      <Icon
                        name="edit"
                        color="52525b"
                        size={12}
                        class="pencil-icon"
                      />
                    </span>
                  </Show>
                  <Show when={editingFilename()}>
                    <input
                      type="text"
                      value={codeFilename()}
                      onInput={(e) => {
                        setCodeFilename(e.target.value);
                        forceLint();
                        try {
                          localStorage.setItem(
                            "c_playground_filename",
                            e.target.value,
                          );
                        } catch (e) {}
                      }}
                      onBlur={() => setEditingFilename(false)}
                      onKeyDown={(e) => {
                        if (e.key === "Enter") {
                          setEditingFilename(false);
                          e.target.blur();
                        }
                      }}
                      class="bg-[#27272a] text-[#a1a1aa] border border-[#3f3f46] rounded px-1.5 py-0.5 text-xs focus:outline-none focus:border-orange-500 w-24 md:w-32 font-mono"
                      placeholder="main.c"
                      autofocus
                    />
                  </Show>
                </div>

                {/* Mode 42 Toolbar (visible only when mode 42 is active) */}
                <Show when={mode42()}>
                  <div class="flex items-center gap-1.5 px-3 py-1.5 md:px-4 md:py-1.5 bg-[#18181b] border-b border-[#27272a] shrink-0 flex-wrap">
                    <button
                      onClick={openHeaderModal42}
                      class="flex items-center rounded-lg transition-colors px-2.5 py-1 bg-amber-600 hover:bg-amber-500 text-white text-[10px] md:text-xs font-semibold gap-1 shrink-0"
                      title="Insert 42 header"
                    >
                      <Icon name="table" color="ffffff" size={12} />
                      <span>Header</span>
                    </button>
                    <button
                      onClick={formatCode42}
                      disabled={!mode42FormatterReady()}
                      class="flex items-center rounded-lg transition-colors px-2.5 py-1 disabled:opacity-50 disabled:cursor-not-allowed bg-purple-600 hover:bg-purple-500 text-white text-[10px] md:text-xs font-semibold gap-1 shrink-0"
                      title={
                        mode42FormatterReady()
                          ? "Format code (42 style)"
                          : "Formatter loading..."
                      }
                    >
                      <Icon
                        name="format-line-spacing"
                        color="ffffff"
                        size={12}
                      />
                      <span>Format</span>
                    </button>
                  </div>
                </Show>
                <div class="flex-1 relative min-h-[200px] overflow-hidden border-b md:border-b-0 md:border-r border-[#27272a] bg-[#1e1e1e]">
                  <div ref={codeEditorRef} class="absolute inset-0"></div>
                </div>

                {/* Norminette Lint Panel (visible only when mode 42 active and errors exist) */}
                <Show when={mode42() && mode42LintPanelVisible()}>
                  <div
                    class="lint-panel shrink-0"
                    style={{ height: `${mode42LintPanelHeight()}px` }}
                  >
                    <For each={mode42LintResults()}>
                      {(err) => {
                        const severityClass =
                          err.level === "Notice" ? "notice" : "error";
                        return (
                          <div
                            class="lint-panel-item"
                            onClick={() =>
                              onLintItemClick42(err.lineno, err.column)
                            }
                          >
                            <span class="lint-line">
                              L{err.lineno}:C{err.column}
                            </span>
                            <span class={`lint-severity ${severityClass}`}>
                              {err.level}
                            </span>
                            <span class="lint-name">{err.name}</span>
                            <span class="lint-text">{err.text}</span>
                          </div>
                        );
                      }}
                    </For>
                  </div>
                </Show>
              </div>

              {/* Terminal / Stdin Panel */}
              <div class="h-[35vh] md:h-auto md:w-[45%] lg:w-[40%] flex flex-col min-h-0 bg-[#09090b] shrink-0 pb-2 md:pb-0">
                {/* Mobile Tab Switcher */}
                <div class="flex md:hidden border-b border-[#27272a] shrink-0">
                  <button
                    onClick={() => setActiveTab("terminal")}
                    class={`flex-1 py-2 text-xs font-semibold uppercase tracking-wider transition-colors ${activeTab() === "terminal" ? "text-blue-400 border-b-2 border-blue-500 bg-[#18181b]" : "text-[#52525b]"}`}
                  >
                    Terminal
                  </button>
                  <button
                    onClick={() => setActiveTab("stdin")}
                    class={`flex-1 py-2 text-xs font-semibold uppercase tracking-wider transition-colors ${activeTab() === "stdin" ? "text-blue-400 border-b-2 border-blue-500 bg-[#18181b]" : "text-[#52525b]"}`}
                  >
                    Stdin / Args
                  </button>
                </div>

                {/* Terminal */}
                <div
                  class={`flex-1 flex flex-col min-h-0 ${activeTab() === "terminal" ? "flex" : "hidden md:flex"}`}
                >
                  <div class="hidden md:flex items-center justify-between px-3 py-1.5 md:px-4 md:py-2 border-b border-[#27272a] shrink-0">
                    <span class="text-[10px] md:text-xs font-semibold text-[#52525b] uppercase tracking-wider">
                      Terminal
                    </span>
                    <Show when={appState() === "RUNNING"}>
                      <span class="text-[10px] md:text-xs font-semibold text-emerald-400 uppercase tracking-wider flex items-center gap-1">
                        <span class="inline-block w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span>
                        Running
                      </span>
                    </Show>
                  </div>
                  <Show when={appState() === "RUNNING" && sabAvailable()}>
                    <div class="px-3 py-1 bg-[#18181b] border-b border-[#27272a] shrink-0 md:hidden">
                      <span class="text-[10px] text-emerald-400 font-semibold uppercase tracking-wider flex items-center gap-1">
                        <span class="inline-block w-1.5 h-1.5 bg-emerald-400 rounded-full animate-pulse"></span>
                        Running
                      </span>
                    </div>
                  </Show>
                  <div class="flex-1 relative overflow-hidden p-1 md:p-2">
                    <div
                      ref={terminalRef}
                      class="absolute inset-1 md:inset-2"
                    ></div>
                  </div>
                  {/* Scroll buttons for mobile */}
                  <div class="flex md:hidden mx-1 mb-1 gap-2">
                    <button
                      onContextMenu={(e) => e.preventDefault()}
                      class="term-scroll-btn flex-1 flex items-center justify-center py-0.5 bg-transparent rounded-lg text-[#a1a1aa] transition-colors"
                      onMouseDown={() => {
                        if (!termInstance) return;
                        termInstance.scrollLines(-5);
                        const iv = setInterval(
                          () => termInstance.scrollLines(-5),
                          80,
                        );
                        const stop = () => {
                          clearInterval(iv);
                          document.removeEventListener("mouseup", stop);
                          document.removeEventListener("mouseleave", stop);
                        };
                        document.addEventListener("mouseup", stop);
                        document.addEventListener("mouseleave", stop);
                      }}
                      onTouchStart={(e) => {
                        e.preventDefault();
                        if (!termInstance) return;
                        termInstance.scrollLines(-5);
                        const iv = setInterval(
                          () => termInstance.scrollLines(-5),
                          80,
                        );
                        const stop = () => {
                          clearInterval(iv);
                          document.removeEventListener("touchend", stop);
                          document.removeEventListener("touchcancel", stop);
                        };
                        document.addEventListener("touchend", stop);
                        document.addEventListener("touchcancel", stop);
                      }}
                    >
                      <Icon name="keyboard-arrow-up" size={22} />
                    </button>
                    <button
                      onContextMenu={(e) => e.preventDefault()}
                      class="term-scroll-btn flex-1 flex items-center justify-center py-0.5 bg-transparent rounded-lg text-[#a1a1aa] transition-colors"
                      onMouseDown={() => {
                        if (!termInstance) return;
                        termInstance.scrollLines(5);
                        const iv = setInterval(
                          () => termInstance.scrollLines(5),
                          80,
                        );
                        const stop = () => {
                          clearInterval(iv);
                          document.removeEventListener("mouseup", stop);
                          document.removeEventListener("mouseleave", stop);
                        };
                        document.addEventListener("mouseup", stop);
                        document.addEventListener("mouseleave", stop);
                      }}
                      onTouchStart={(e) => {
                        e.preventDefault();
                        if (!termInstance) return;
                        termInstance.scrollLines(5);
                        const iv = setInterval(
                          () => termInstance.scrollLines(5),
                          80,
                        );
                        const stop = () => {
                          clearInterval(iv);
                          document.removeEventListener("touchend", stop);
                          document.removeEventListener("touchcancel", stop);
                        };
                        document.addEventListener("touchend", stop);
                        document.addEventListener("touchcancel", stop);
                      }}
                    >
                      <Icon name="keyboard-arrow-down" size={22} />
                    </button>
                  </div>
                </div>

                {/* Stdin / Args - Desktop always visible, mobile tab */}
                <div
                  class={`flex-1 flex flex-col min-h-0 border-t border-[#27272a] ${activeTab() === "stdin" ? "flex md:hidden" : "hidden md:flex"}`}
                >
                  <div class="px-3 py-1.5 md:px-4 md:py-2 border-b border-[#27272a] shrink-0">
                    <span class="text-[10px] md:text-xs font-semibold text-[#52525b] uppercase tracking-wider">
                      Input & Arguments
                    </span>
                  </div>
                  <div class="flex-1 overflow-y-auto p-3 space-y-3">
                    <div>
                      <label class="block text-[10px] font-semibold text-[#52525b] uppercase tracking-wider mb-1">
                        Arguments (argv)
                      </label>
                      <input
                        type="text"
                        value={argvInput()}
                        onInput={(e) => setArgvInput(e.target.value)}
                        placeholder="arg1 arg2 arg3"
                        class="w-full bg-[#18181b] text-[#d4d4d8] rounded-lg px-3 py-2 text-xs border border-[#27272a] focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                      />
                    </div>
                    <div class="flex-1 flex flex-col min-h-0">
                      <label class="block text-[10px] font-semibold text-[#52525b] uppercase tracking-wider mb-1">
                        Standard Input (stdin)
                        <Show when={sabAvailable()}>
                          <span class="text-[#52525b] font-normal normal-case ml-1">
                            — pre-input (consumed before terminal input)
                          </span>
                        </Show>
                      </label>
                      <textarea
                        value={stdinInput()}
                        onInput={(e) => setStdinInput(e.target.value)}
                        placeholder="Input for scanf, getchar, etc."
                        class="flex-1 min-h-[80px] bg-[#18181b] text-[#d4d4d8] rounded-lg px-3 py-2 text-xs border border-[#27272a] focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 resize-none font-mono"
                      />
                    </div>
                  </div>
                </div>
              </div>
            </div>

            {/* Mode 42 Status Bar (visible only when mode 42 is active and has status) */}
            <Show when={mode42() && mode42StatusText()}>
              <div class="status-bar">
                <span class={`status-dot ${mode42StatusState()}`}></span>
                <span class="text-[#52525b]">{mode42StatusText()}</span>
                <span class="flex-1"></span>
                <span
                  class="text-[#52525b]"
                  style={{ color: mode42ErrorColor() }}
                >
                  {mode42ErrorCount() > 0
                    ? `${mode42ErrorCount()} error(s)`
                    : ""}
                </span>
              </div>
            </Show>

            {/* 42 Header Modal */}
            <Show when={mode42ModalVisible()}>
              <div
                class="modal-overlay"
                onPointerDown={(e) => {
                  if (e.target === e.currentTarget) closeHeaderModal42();
                }}
              >
                <div class="modal-box">
                  <h2 class="text-lg font-bold text-[#d4d4d8] mb-1">
                    42 Header Settings
                  </h2>
                  <p class="text-xs text-[#52525b] mb-4">
                    Insert the 42 header into your file.
                  </p>
                  <div class="space-y-3 mb-5">
                    <div>
                      <label class="block text-[10px] font-semibold text-[#52525b] uppercase tracking-wider mb-1">
                        42 Username
                      </label>
                      <input
                        type="text"
                        value={mode42ModalUser()}
                        onInput={(e) => setMode42ModalUser(e.target.value)}
                        class="modal-input"
                        placeholder="marvin"
                      />
                    </div>
                    <div>
                      <label class="block text-[10px] font-semibold text-[#52525b] uppercase tracking-wider mb-1">
                        42 Email
                      </label>
                      <input
                        type="text"
                        value={mode42ModalEmail()}
                        onInput={(e) => setMode42ModalEmail(e.target.value)}
                        class="modal-input"
                        placeholder="marvin@42.fr"
                      />
                    </div>
                  </div>
                  <div class="flex gap-2 justify-end">
                    <button
                      onClick={closeHeaderModal42}
                      class="px-4 py-2 rounded-lg bg-[#27272a] hover:bg-[#3f3f46] text-[#a1a1aa] text-sm font-semibold transition-colors"
                    >
                      Cancel
                    </button>
                    <button
                      onClick={insertHeader42}
                      class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-500 text-white text-sm font-semibold transition-colors"
                    >
                      Insert Header
                    </button>
                  </div>
                </div>
              </div>
            </Show>
          </div>
        );
      }

      render(() => <App />, document.getElementById("root"));
    </script>
  </body>
</html>
