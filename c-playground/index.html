<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>C Playground - Online Compiler</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS v4 -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- xterm.js CSS -->
    <link rel="stylesheet" href="https://esm.sh/xterm@5.3.0/css/xterm.css" />

    <!-- Import Map including CodeMirror 6 -->
    <script type="importmap">
      {
        "imports": {
          "solid-js": "https://esm.sh/solid-js@1.9.12",
          "solid-js/web": "https://esm.sh/solid-js@1.9.12/web",
          "babel-preset-solid": "https://esm.sh/babel-preset-solid@1.9.12",
          "@babel/standalone": "https://esm.sh/@babel/standalone@7.29.2",
          "xterm": "https://esm.sh/xterm@5.3.0",
          "xterm-addon-fit": "https://esm.sh/xterm-addon-fit@0.8.0",
          "codemirror": "https://esm.sh/codemirror@6.0.2",
          "@codemirror/lang-cpp": "https://esm.sh/@codemirror/lang-cpp@6.0.3",
          "@uiw/codemirror-theme-vscode": "https://esm.sh/@uiw/codemirror-theme-vscode@4.25.9"
        }
      }
    </script>

    <script type="module">
      import babelPresetSolid from "babel-preset-solid";
      import Babel from "@babel/standalone";
      Babel.registerPreset("solid", babelPresetSolid);
    </script>

    <style>
      :root {
        --color-base-100: #09090b;
        --color-base-200: #18181b;
        --color-base-300: #27272a;
        --color-text-main: #d4d4d8;
        --color-text-muted: #a1a1aa;
        --color-text-disabled: #52525b;
        --color-primary: #2563eb;
        --color-primary-hover: #3b82f6;
        --color-primary-dim: #1e3a8a;
        --color-primary-text: #93c5fd;
        --color-border-subtle: #27272a;
        --color-border-focus: #475569;
      }
      
      body {
        background-color: var(--color-base-100);
        color: var(--color-text-main);
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        overscroll-behavior: none;
      }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #52525b; }

      button { cursor: pointer; -webkit-tap-highlight-color: transparent; }

      .spinner {
        border: 2px solid rgba(255,255,255,0.1);
        border-left-color: #fff;
        border-radius: 50%;
        width: 16px;
        height: 16px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

      /* CodeMirror 6 Custom Overrides */
      .cm-editor {
        height: 100%;
        width: 100%;
        position: absolute !important;
        border-radius: 0.5rem;
      }
      .cm-scroller {
        font-family: 'Courier New', Courier, monospace;
        font-size: 14px;
        overflow: auto;
      }
      
      /* Mobile optimizations for CodeMirror */
      @media (max-width: 768px) {
        .cm-scroller { font-size: 13px; }
      }

      /* xterm.js custom scrollbar integration fix */
      .xterm-viewport::-webkit-scrollbar { width: 6px; }
      .xterm-viewport::-webkit-scrollbar-track { background: transparent; }
      .xterm-viewport::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 3px; }
    </style>
  </head>
  <body class="bg-[#09090b] text-[#d4d4d8] h-screen flex flex-col overflow-hidden">
    <script>
      if (!window.location.href.endsWith('/')) window.location.replace(window.location.href + '/');
      if (navigator.serviceWorker) {
        navigator.serviceWorker.getRegistrations().then(regs => {
          for (const reg of regs) {
            console.log('Unregistering service worker:', reg.scope);
            reg.unregister();
          }
        });
      }
    </script>
    <div id="root" class="h-full"></div>

    <script type="text/babel" data-type="module" data-presets="solid">
      import { createSignal, createMemo, Show, onMount, onCleanup } from "solid-js";
      import { render } from "solid-js/web";
      import { Terminal } from "xterm";
      import { FitAddon } from "xterm-addon-fit";

      // CodeMirror 6 Imports
      import { basicSetup, EditorView } from "codemirror";
      import { cpp } from "@codemirror/lang-cpp";
      import { vscodeDark } from "@uiw/codemirror-theme-vscode";

      // ==========================================
      // WORKER API
      // ==========================================
      class CompilerWorkerAPI {
        constructor(onWrite, binaries) {
          this.nextResponseId = 0;
          this.responseCBs = new Map();
          this.onWrite = onWrite;
          this.worker = new Worker('compiler-worker.js');
          const channel = new MessageChannel();
          this.port = channel.port1;
          this.port.onmessage = this.onmessage.bind(this);

          const remotePort = channel.port2;
          this.worker.postMessage({ id: 'constructor', data: { port: remotePort, binaries } }, [remotePort]);
        }

        terminate() {
          this.worker.terminate();
        }

        async runAsync(id, options) {
          const responseId = this.nextResponseId++;
          const responsePromise = new Promise((resolve, reject) => {
            this.responseCBs.set(responseId, { resolve, reject });
          });
          this.port.postMessage({ id, responseId, data: options });
          return await responsePromise;
        }

        async compileAndRun(code, args, stdin) {
          return this.runAsync('compileAndRun', { code, args, stdin });
        }

        onmessage(event) {
          switch (event.data.id) {
            case 'write':
              if (this.onWrite) this.onWrite(event.data.data);
              break;

            case 'runAsync': {
              const responseId = event.data.responseId;
              const promise = this.responseCBs.get(responseId);
              if (promise) {
                this.responseCBs.delete(responseId);
                promise.resolve(event.data.data);
              }
              break;
            }
          }
        }
      }

      async function loadWasmClangBinaries() {
        const files = [
          { name: 'clang', url: '../clang' },
          { name: 'lld', url: '../lld' },
          { name: 'memfs', url: '../memfs' },
          { name: 'sysroot', url: '../sysroot.tar' },
        ];
        const binaries = {};
        for (const f of files) {
          const buf = await new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('GET', f.url + '?t=' + Date.now(), true);
            xhr.responseType = 'arraybuffer';
            xhr.onload = () => {
              if (xhr.status === 200) {
                resolve(xhr.response);
              } else {
                reject(new Error(`Failed to load ${f.url}: ${xhr.status}`));
              }
            };
            xhr.onerror = () => reject(new Error(`Network error loading ${f.url}`));
            xhr.send();
          });
          binaries[f.name] = buf;
        }
        return binaries;
      }

      // ==========================================
      // ICON SYSTEM
      // ==========================================
      const svgCache = new Map();
      const svgSignals = new Map();

      function getIconUrl(name, color = "e4e4e7", size = 24) {
        return `https://api.iconify.design/material-symbols/${name}.svg?color=%23${color}&height=${size}`;
      }

      function fetchIcon(name, color = "e4e4e7", size = 24) {
        const key = `${name}|${color}|${size}`;
        if (svgCache.has(key)) return svgCache.get(key);
        if (svgSignals.has(key)) return svgSignals.get(key);

        const [svg, setSvg] = createSignal("");
        svgSignals.set(key, svg);

        fetch(getIconUrl(name, color, size))
          .then((r) => r.text())
          .then((text) => {
            svgCache.set(key, text);
            setSvg(text);
            svgSignals.delete(key);
          })
          .catch(() => {});

        return svg();
      }

      const Icon = (props) => {
        const name = () => props.name;
        const color = () => props.color || "e4e4e7";
        const size = () => props.size || 24;
        const key = () => `${name()}|${color()}|${size()}`;

        const svgContent = createMemo(() => {
          const k = key();
          if (svgCache.has(k)) return svgCache.get(k);
          fetchIcon(name(), color(), size());
          const sig = svgSignals.get(k);
          return sig ? sig() : "";
        });

        return (
          <Show when={svgContent()}>
            <div
              innerHTML={svgContent()}
              class={`inline-flex items-center justify-center ${props.class || ""}`}
              style={{ width: `${size()}px`, height: `${size()}px` }}
            />
          </Show>
        );
      };

      // ==========================================
      // MAIN APPLICATION COMPONENT
      // ==========================================
      function App() {
        const [appState, setAppState] = createSignal("IDLE");
        const [statusMessage, setStatusMessage] = createSignal("");
        const [executionError, setExecutionError] = createSignal(null);

        let codeEditorRef;
        let cmInstance;
        let saveTimeout;
        let terminalRef;
        let termInstance;
        let fitAddon;
        let compilerApi;

        const defaultCode = `// Welcome to the C Playground!
// Compile and run C code directly in your browser.
// Supports argv arguments and stdin input.

#include <stdio.h>

int main(int argc, char **argv) {
    printf("Hello from C Playground!\\n");
    printf("argc = %d\\n", argc);

    for (int i = 0; i < argc; i++) {
        printf("argv[%d] = %s\\n", i, argv[i]);
    }

    printf("\\nEnter a number: ");
    int num;
    if (scanf("%d", &num) == 1) {
        printf("You entered: %d\\n", num);
    }

    return 0;
}
`;

        const LOCAL_STORAGE_KEY = 'c_playground_code';
        
        const loadSavedCode = () => {
          try {
            const saved = localStorage.getItem(LOCAL_STORAGE_KEY);
            return saved !== null ? saved : defaultCode;
          } catch (e) {
            return defaultCode;
          }
        };
        
        const [scriptCode, setScriptCode] = createSignal(loadSavedCode());
        const [argvInput, setArgvInput] = createSignal("hello 42 world");
        const [stdinInput, setStdinInput] = createSignal("123");
        const [activeTab, setActiveTab] = createSignal("terminal"); // 'terminal' | 'stdin'

        onMount(async () => {
          // Initialize CodeMirror 6
          if (codeEditorRef) {
            cmInstance = new EditorView({
              doc: scriptCode(),
              extensions: [
                basicSetup,
                cpp(),
                vscodeDark,
                EditorView.updateListener.of((update) => {
                  if (update.docChanged) {
                    const newCode = update.state.doc.toString();
                    setScriptCode(newCode);
                    setExecutionError(null);
                    
                    // Debounce save to localStorage (1 second)
                    if (saveTimeout) clearTimeout(saveTimeout);
                    saveTimeout = setTimeout(() => {
                      try {
                        localStorage.setItem(LOCAL_STORAGE_KEY, newCode);
                      } catch (e) {}
                    }, 1000);
                  }
                })
              ],
              parent: codeEditorRef
            });
          }

          // Initialize xterm.js
          termInstance = new Terminal({
            theme: { background: '#09090b', foreground: '#d4d4d8' },
            fontFamily: "'Courier New', Courier, monospace",
            fontSize: 13,
            cursorBlink: true,
            convertEol: true,
            scrollback: 5000,
          });
          fitAddon = new FitAddon();
          termInstance.loadAddon(fitAddon);

          if (terminalRef) {
            termInstance.open(terminalRef);
            requestAnimationFrame(() => {
              try { fitAddon.fit(); } catch(e) {}
            });

            const resizeObserver = new ResizeObserver(() => {
              try { fitAddon.fit(); } catch(e) {}
            });
            resizeObserver.observe(terminalRef);
          }

          try {
            const binaries = await loadWasmClangBinaries();
            compilerApi = new CompilerWorkerAPI((data) => {
              if (termInstance) termInstance.write(data);
            }, binaries);
            termInstance.writeln("\x1b[36mCompiler loaded successfully.\x1b[0m\n");
          } catch (err) {
            termInstance.writeln(`\x1b[31mFailed to initialize compiler: ${err.message}\x1b[0m`);
          }
        });

        onCleanup(() => {
          if (compilerApi) compilerApi.terminate();
        });

        const runProgram = async () => {
          if (appState() === "COMPILING") return;

          setAppState("COMPILING");
          setExecutionError(null);
          termInstance.clear();

          try {
            const args = argvInput()
              .split(/\s+/)
              .map(s => s.trim())
              .filter(s => s.length > 0);

            setStatusMessage("Compiling...");
            termInstance.writeln("\x1b[34mCompiling and running...\x1b[0m\n");
            const result = await compilerApi.compileAndRun(scriptCode(), args, stdinInput());

            if (result.error) {
              throw new Error(result.error);
            }

            termInstance.writeln("\n\x1b[32mProgram finished.\x1b[0m");
          } catch (err) {
            setExecutionError(err.message);
            termInstance.writeln(`\n\x1b[31m${err.message}\x1b[0m`);
          } finally {
            setAppState("IDLE");
          }
        };

        const clearTerminal = () => {
          if (termInstance) termInstance.clear();
        };

        const resetCode = () => {
          if (confirm('Reset code to default? This will overwrite your current code.')) {
            if (cmInstance) {
              cmInstance.dispatch({
                changes: {
                  from: 0,
                  to: cmInstance.state.doc.length,
                  insert: defaultCode
                }
              });
              setScriptCode(defaultCode);
            }
            try {
              localStorage.removeItem(LOCAL_STORAGE_KEY);
            } catch (e) {}
          }
        };

        return (
          <div class="h-full flex flex-col overflow-hidden">
            {/* Header */}
            <header class="bg-[#18181b] border-b border-[#27272a] px-3 py-2 md:px-4 md:py-3 flex items-center justify-between shrink-0 gap-2">
              <div class="flex items-center space-x-2 md:space-x-3 min-w-0">
                <div class="bg-blue-600 p-1.5 rounded-lg flex items-center justify-center shrink-0">
                  <Icon name="code" color="ffffff" size={20} />
                </div>
                <div class="min-w-0">
                  <h1 class="text-sm md:text-lg font-bold text-[#d4d4d8] truncate">C Playground</h1>
                  <p class="text-[10px] md:text-xs text-[#52525b] hidden sm:block">Compile & run C in your browser</p>
                </div>
              </div>

              <div class="flex items-center space-x-1 md:space-x-2 shrink-0">
                <button
                  onClick={clearTerminal}
                  class="p-2 rounded-lg bg-[#27272a] hover:bg-[#3f3f46] text-[#a1a1aa] transition-colors flex"
                  title="Clear Terminal"
                >
                  <Icon name="mop" size={18} />
                </button>
                <button
                  onClick={resetCode}
                  disabled={appState() === "COMPILING"}
                  class="p-2 rounded-lg bg-[#27272a] hover:bg-[#3f3f46] text-[#a1a1aa] transition-colors hidden sm:flex disabled:opacity-50"
                  title="Reset Code"
                >
                  <Icon name="restart-alt" size={18} />
                </button>
                <button
                  onClick={runProgram}
                  disabled={appState() === "COMPILING"}
                  class="flex items-center rounded-lg transition-colors p-2 ml-4 disabled:opacity-50 bg-emerald-600 hover:bg-emerald-500 text-white shrink-0"
                >
                  <Show when={appState() === "COMPILING"} fallback={<Icon name="play-arrow" color="ffffff" size={16} />}>
                    <div class="spinner" style={{ width: '14px', height: '14px', border: '2px solid rgba(255,255,255,0.2)', 'border-left-color': '#fff' }}></div>
                  </Show>
                </button>
              </div>
            </header>


            {/* Main Content */}
            <div class="flex-1 flex flex-col md:flex-row overflow-hidden min-h-0">
              {/* Editor */}
              <div class="flex-1 flex flex-col min-h-0 min-w-0">
                <div class="flex items-center px-3 py-1.5 md:px-4 md:py-2 bg-[#09090b] border-b border-[#27272a] shrink-0">
                  <span class="text-[10px] md:text-xs font-semibold text-[#52525b] uppercase tracking-wider">main.c</span>
                </div>
                <div class="flex-1 relative min-h-[200px] overflow-hidden border-b md:border-b-0 md:border-r border-[#27272a] bg-[#1e1e1e]">
                  <div ref={codeEditorRef} class="absolute inset-0"></div>
                </div>
              </div>

              {/* Terminal / Stdin Panel */}
              <div class="h-[35vh] md:h-auto md:w-[45%] lg:w-[40%] flex flex-col min-h-0 bg-[#09090b] shrink-0">
                {/* Mobile Tab Switcher */}
                <div class="flex md:hidden border-b border-[#27272a] shrink-0">
                  <button
                    onClick={() => setActiveTab("terminal")}
                    class={`flex-1 py-2 text-xs font-semibold uppercase tracking-wider transition-colors ${activeTab() === "terminal" ? "text-blue-400 border-b-2 border-blue-500 bg-[#18181b]" : "text-[#52525b]"}`}
                  >
                    Terminal
                  </button>
                  <button
                    onClick={() => setActiveTab("stdin")}
                    class={`flex-1 py-2 text-xs font-semibold uppercase tracking-wider transition-colors ${activeTab() === "stdin" ? "text-blue-400 border-b-2 border-blue-500 bg-[#18181b]" : "text-[#52525b]"}`}
                  >
                    Stdin / Args
                  </button>
                </div>

                {/* Terminal */}
                <div class={`flex-1 flex flex-col min-h-0 ${activeTab() === "terminal" ? "flex" : "hidden md:flex"}`}>
                  <div class="hidden md:flex items-center justify-between px-3 py-1.5 md:px-4 md:py-2 border-b border-[#27272a] shrink-0">
                    <span class="text-[10px] md:text-xs font-semibold text-[#52525b] uppercase tracking-wider">Terminal</span>
                  </div>
                  <div class="flex-1 relative overflow-hidden p-1 md:p-2">
                    <div ref={terminalRef} class="absolute inset-1 md:inset-2"></div>
                  </div>
                </div>

                {/* Stdin / Args - Desktop always visible, mobile tab */}
                <div class={`flex-1 flex flex-col min-h-0 border-t border-[#27272a] ${activeTab() === "stdin" ? "flex md:hidden" : "hidden md:flex"}`}>
                  <div class="px-3 py-1.5 md:px-4 md:py-2 border-b border-[#27272a] shrink-0">
                    <span class="text-[10px] md:text-xs font-semibold text-[#52525b] uppercase tracking-wider">Input & Arguments</span>
                  </div>
                  <div class="flex-1 overflow-y-auto p-3 space-y-3">
                    <div>
                      <label class="block text-[10px] font-semibold text-[#52525b] uppercase tracking-wider mb-1">
                        Arguments (argv)
                      </label>
                      <input
                        type="text"
                        value={argvInput()}
                        onInput={(e) => setArgvInput(e.target.value)}
                        placeholder="arg1 arg2 arg3"
                        class="w-full bg-[#18181b] text-[#d4d4d8] rounded-lg px-3 py-2 text-xs border border-[#27272a] focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500"
                      />
                    </div>
                    <div class="flex-1 flex flex-col min-h-0">
                      <label class="block text-[10px] font-semibold text-[#52525b] uppercase tracking-wider mb-1">
                        Standard Input (stdin)
                      </label>
                      <textarea
                        value={stdinInput()}
                        onInput={(e) => setStdinInput(e.target.value)}
                        placeholder="Input for scanf, getchar, etc."
                        class="flex-1 min-h-[80px] bg-[#18181b] text-[#d4d4d8] rounded-lg px-3 py-2 text-xs border border-[#27272a] focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 resize-none font-mono"
                      />
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      render(() => <App />, document.getElementById("root"));
    </script>
  </body>
</html>
