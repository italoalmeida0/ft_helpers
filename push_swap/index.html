    <script type="text/babel" data-type="module" data-presets="solid">
      import { createSignal, createMemo, For, Show, onMount } from "solid-js";
      import { render } from "solid-js/web";
      import { Terminal } from "@xterm/xterm";
      import { FitAddon } from "@xterm/addon-fit";
      import { WebglAddon } from "@xterm/addon-webgl";
      import { UnicodeGraphemesAddon } from "@xterm/addon-unicode-graphemes";

      // CodeMirror 6 Imports
      import { keymap } from "@codemirror/view";
      import { basicSetup, EditorView  } from "codemirror";
      import { cpp } from "@codemirror/lang-cpp";
      import { vscodeDark } from "@uiw/codemirror-theme-vscode";
      import { indentationMarkers } from '@replit/codemirror-indentation-markers';
      import { indentWithTab } from "@codemirror/commands";
      import { Prec } from '@codemirror/state';

      // ==========================================
      // WORKER API
      // ==========================================
      class CompilerWorkerAPI {
        constructor(onWrite, binaries) {
          this.nextResponseId = 0;
          this.responseCBs = new Map();
          this.onWrite = onWrite;
          this.worker = new Worker('compiler-worker.js');
          const channel = new MessageChannel();
          this.port = channel.port1;
          this.port.onmessage = this.onmessage.bind(this);

          const remotePort = channel.port2;
          this.worker.postMessage({ id: 'constructor', data: { port: remotePort, binaries } }, [remotePort]);
        }

        terminate() {
          this.worker.terminate();
        }

        async runAsync(id, options) {
          const responseId = this.nextResponseId++;
          const responsePromise = new Promise((resolve, reject) => {
            this.responseCBs.set(responseId, { resolve, reject });
          });
          this.port.postMessage({ id, responseId, data: options });
          return await responsePromise;
        }

        async compileAndRun(code, args) {
          return this.runAsync('compileAndRun', { code, args });
        }

        onmessage(event) {
          switch (event.data.id) {
            case 'write':
              if (this.onWrite) this.onWrite(event.data.data);
              break;

            case 'runAsync': {
              const responseId = event.data.responseId;
              const promise = this.responseCBs.get(responseId);
              if (promise) {
                this.responseCBs.delete(responseId);
                promise.resolve(event.data.data);
              }
              break;
            }
          }
        }
      }

      async function loadWasmClangBinaries() {
        const files = [
          { name: 'clang', url: '../clang' },
          { name: 'lld', url: '../lld' },
          { name: 'memfs', url: '../memfs' },
          { name: 'sysroot', url: '../sysroot.tar' },
        ];
        const binaries = {};
        for (const f of files) {
          const buf = await new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('GET', f.url + '?t=' + Date.now(), true);
            xhr.responseType = 'arraybuffer';
            xhr.onload = () => {
              if (xhr.status === 200) {
                resolve(xhr.response);
              } else {
                reject(new Error(`Failed to load ${f.url}: ${xhr.status}`));
              }
            };
            xhr.onerror = () => reject(new Error(`Network error loading ${f.url}`));
            xhr.send();
          });
          binaries[f.name] = buf;
        }
        return binaries;
      }

      // ==========================================
      // ICON SYSTEM 
      // ==========================================
      const svgCache = new Map();
      const svgSignals = new Map();

      function getIconUrl(name, color = "e4e4e7", size = 24) {
        return `https://api.iconify.design/material-symbols/${name}.svg?color=%23${color}&height=${size}`;
      }

      function fetchIcon(name, color = "e4e4e7", size = 24) {
        const key = `${name}|${color}|${size}`;
        if (svgCache.has(key)) return svgCache.get(key);
        if (svgSignals.has(key)) return svgSignals.get(key);

        const [svg, setSvg] = createSignal("");
        svgSignals.set(key, svg);

        fetch(getIconUrl(name, color, size))
          .then((r) => r.text())
          .then((text) => {
            svgCache.set(key, text);
            setSvg(text);
            svgSignals.delete(key);
          })
          .catch(() => {});

        return svg();
      }

      const Icon = (props) => {
        const name = () => props.name;
        const color = () => props.color || "e4e4e7";
        const size = () => props.size || 24;
        const key = () => `${name()}|${color()}|${size()}`;

        const svgContent = createMemo(() => {
          const k = key();
          if (svgCache.has(k)) return svgCache.get(k);
          fetchIcon(name(), color(), size());
          const sig = svgSignals.get(k);
          return sig ? sig() : "";
        });

        return (
          <Show when={svgContent()}>
            <div
              innerHTML={svgContent()}
              class={`inline-flex items-center justify-center ${props.class || ""}`}
              style={{ width: `${size()}px`, height: `${size()}px` }}
            />
          </Show>
        );
      };

      // ==========================================
      // PUSH SWAP LOGIC & DATA
      // ==========================================
      
      const OPERATIONS = [
        { id: 'sa', type: 'swap', desc: 'Swap A' },
        { id: 'sb', type: 'swap', desc: 'Swap B' },
        { id: 'ss', type: 'swap', desc: 'Swap Both' },
        { id: 'pa', type: 'push', desc: 'Push to A' },
        { id: 'pb', type: 'push', desc: 'Push to B' },
        { id: 'ra', type: 'rotate', desc: 'Rotate A' },
        { id: 'rb', type: 'rotate', desc: 'Rotate B' },
        { id: 'rr', type: 'rotate', desc: 'Rotate Both' },
        { id: 'rra', type: 'rev', desc: 'Rev Rotate A' },
        { id: 'rrb', type: 'rev', desc: 'Rev Rotate B' },
        { id: 'rrr', type: 'rev', desc: 'Rev Rotate Both' }
      ];

      const getInverseOperation = (op) => {
        const inverseMap = {
          'sa': 'sa', 'sb': 'sb', 'ss': 'ss',
          'pa': 'pb', 'pb': 'pa',
          'ra': 'rra', 'rb': 'rrb', 'rr': 'rrr',
          'rra': 'ra', 'rrb': 'rb', 'rrr': 'rr'
        };
        return inverseMap[op];
      };

      function getBlockClass(type) {
        switch(type) {
          case 'swap': return 'block-swap';
          case 'push': return 'block-push';
          case 'rotate': return 'block-rotate';
          case 'rev': return 'block-rev';
          default: return 'bg-gray-500 text-white';
        }
      }

      // ==========================================
      // MAIN APPLICATION COMPONENT
      // ==========================================
      
      function App() {
        const [itemCount, setItemCount] = createSignal(10);
        const [stackA, setStackA] = createSignal([]);
        const [stackB, setStackB] = createSignal([]);
        
        const [history, setHistory] = createSignal([]);
        const [historyCursor, setHistoryCursor] = createSignal(0);
        
        const [appState, setAppState] = createSignal("IDLE");
        const [statusMessage, setStatusMessage] = createSignal("");
        const [executionError, setExecutionError] = createSignal(null);
        
        let codeEditorRef;
        let cmInstance;
        let saveTimeout;

        // Terminal references
        let terminalRef;
        let termInstance;
        let fitAddon;
        let compilerApi;

        const defaultCode = `// 42 push_swap
// ----------------------------
// Stack A is passed as arguments (argv) to the main function.
// Just write operations to standard output to animate the visualizer.

#include <stdio.h>

void pb() { printf("pb\\n"); }
void sa() { printf("sa\\n"); }
void pa() { printf("pa\\n"); }

int main(int argc, char **argv) {
  if (argc < 2) return 0;
  
  // Example: Push first element to B, swap next two, push back to A.
  // In a real push_swap, you would parse argv[] to build your stacks.
  
  pb();
  sa();
  pa();
  
  return 0;
}
`;
        
        const LOCAL_STORAGE_KEY = 'push_swap_code';

        // ==========================================
        // SHARE VIA URL HASH (no backend)
        // Uses gzip + base64url encoding in the hash
        // ==========================================
        const compressToHash = async (code) => {
          const blob = new Blob([code]);
          const cs = new CompressionStream('gzip');
          const stream = blob.stream().pipeThrough(cs);
          const compressed = await new Response(stream).arrayBuffer();
          const bytes = new Uint8Array(compressed);
          let binary = '';
          for (let i = 0; i < bytes.length; i++) {
            binary += String.fromCharCode(bytes[i]);
          }
          return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        };

        const decompressFromHash = async (hashStr) => {
          const base64 = hashStr.replace(/-/g, '+').replace(/_/g, '/');
          const padded = base64 + '='.repeat((4 - base64.length % 4) % 4);
          const binary = atob(padded);
          const bytes = new Uint8Array(binary.length);
          for (let i = 0; i < binary.length; i++) {
            bytes[i] = binary.charCodeAt(i);
          }
          const blob = new Blob([bytes]);
          const ds = new DecompressionStream('gzip');
          const stream = blob.stream().pipeThrough(ds);
          return await new Response(stream).text();
        };

        const loadFromHash = async () => {
          const hash = window.location.hash.slice(1);
          if (!hash) return null;
          try {
            return await decompressFromHash(hash);
          } catch (e) {
            console.warn('Failed to decode hash:', e);
            return null;
          }
        };

        const shareCode = async () => {
          try {
            const compressed = await compressToHash(scriptCode());
            const url = window.location.origin + window.location.pathname + '#' + compressed;
            await navigator.clipboard.writeText(url);
            setShareStatus('copied');
            setTimeout(() => setShareStatus('idle'), 2000);
          } catch (e) {
            const compressed = await compressToHash(scriptCode());
            window.location.hash = compressed;
            setShareStatus('copied');
            setTimeout(() => setShareStatus('idle'), 2000);
          }
        };

        const [shareStatus, setShareStatus] = createSignal("idle"); // idle | copied

        const loadSavedCode = () => {
          try {
            const saved = localStorage.getItem(LOCAL_STORAGE_KEY);
            return saved !== null ? saved : defaultCode;
          } catch (e) {
            return defaultCode;
          }
        };
        
        const [scriptCode, setScriptCode] = createSignal(loadSavedCode());

        // --- VALIDATION & BENCHMARK LOGIC ---
        const isSorted = createMemo(() => {
          const a = stackA();
          const b = stackB();
          if (b.length > 0) return false;
          if (a.length === 0) return true;
          for (let i = 0; i < a.length - 1; i++) {
            if (a[i] > a[i + 1]) return false;
          }
          return true;
        });

        const benchmarkStatus = createMemo(() => {
          const count = parseInt(itemCount(), 10);
          const ops = historyCursor();
          
          if (count === 100) {
            if (ops < 700) return { label: "Excellent", class: "text-emerald-500" };
            if (ops < 1500) return { label: "Good", class: "text-blue-500" };
            if (ops < 2000) return { label: "Pass", class: "text-yellow-500" };
            return { label: "Fail", class: "text-red-500" };
          } 
          else if (count === 500) {
            if (ops < 5500) return { label: "Excellent", class: "text-emerald-500" };
            if (ops < 8000) return { label: "Good", class: "text-blue-500" };
            if (ops < 12000) return { label: "Pass", class: "text-yellow-500" };
            return { label: "Fail", class: "text-red-500" };
          }
          return { label: "N/A", class: "text-gray-500" };
        });

        const generateStacks = (forcedCount = null) => {
          if (forcedCount) setItemCount(forcedCount);
          const count = parseInt(itemCount(), 10) || 10;
          let newArray = Array.from({ length: count }, (_, i) => i + 1);
          
          for (let i = newArray.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
          }
          
          setStackA(newArray);
          setStackB([]);
          setHistory([]);
          setHistoryCursor(0);
          setAppState("IDLE");
          setExecutionError(null);
          if (termInstance) termInstance.clear();
        };

        onMount(async () => {
          generateStacks();

          // Check for shared code in URL hash
          const hashCode = await loadFromHash();
          if (hashCode) {
            setScriptCode(hashCode);
          }

          // Initialize CodeMirror 6
          if (codeEditorRef) {
            cmInstance = new EditorView({
              doc: scriptCode(),
              extensions: [
                basicSetup,
                keymap.of([indentWithTab]),
                indentationMarkers(),
                cpp(),
                vscodeDark,
                Prec.highest(
                  keymap.of([
                    {
                      key: 'Mod-s',
                      run: () => ({}),
                    },
                  ])
                ),
                EditorView.updateListener.of((update) => {
                  if (update.docChanged) {
                    const newCode = update.state.doc.toString();
                    setScriptCode(newCode);
                    setExecutionError(null);
                    
                    // Debounce save to localStorage (1 second)
                    if (saveTimeout) clearTimeout(saveTimeout);
                    saveTimeout = setTimeout(() => {
                      try {
                        localStorage.setItem(LOCAL_STORAGE_KEY, newCode);
                      } catch (e) {}
                    }, 1000);
                  }
                })
              ],
              parent: codeEditorRef
            });
          }

          // Initialize xterm.js
          termInstance = new Terminal({
            theme: { background: '#1e1e1e', foreground: '#d4d4d8' },
            fontFamily: "'Courier New', Courier, monospace",
            fontSize: 13,
            cursorBlink: true,
            allowProposedApi: true,
            convertEol: true
          });
          fitAddon = new FitAddon();
          termInstance.loadAddon(fitAddon);
          termInstance.loadAddon(new UnicodeGraphemesAddon());
          termInstance.loadAddon(new WebglAddon());

          if (terminalRef) {
            termInstance.open(terminalRef);
            fitAddon.fit();
            
            const resizeObserver = new ResizeObserver(() => {
              try { fitAddon.fit(); } catch(e) {}
            });
            resizeObserver.observe(terminalRef);
            
          }

          termInstance.writeln("\x1b[33mLoading compiler...\x1b[0m\n");
          try {
            const binaries = await loadWasmClangBinaries();
            compilerApi = new CompilerWorkerAPI((data) => {
              if (termInstance) termInstance.write(data);
            }, binaries);
            termInstance.clear();
            termInstance.writeln("\x1b[36mCompiler loaded successfully.\x1b[0m\n");
          } catch (err) {
            termInstance.clear();
            termInstance.writeln(`\x1b[31mFailed to initialize compiler: ${err.message}\x1b[0m`);
          }
        });

        const applyOpState = (op, currentA, currentB) => {
          let a = [...currentA];
          let b = [...currentB];

          switch (op) {
            case 'sa': if (a.length >= 2) [a[0], a[1]] = [a[1], a[0]]; break;
            case 'sb': if (b.length >= 2) [b[0], b[1]] = [b[1], b[0]]; break;
            case 'ss': 
              if (a.length >= 2) [a[0], a[1]] = [a[1], a[0]];
              if (b.length >= 2) [b[0], b[1]] = [b[1], b[0]];
              break;
            case 'pa': if (b.length > 0) a.unshift(b.shift()); break;
            case 'pb': if (a.length > 0) b.unshift(a.shift()); break;
            case 'ra': if (a.length > 1) a.push(a.shift()); break;
            case 'rb': if (b.length > 1) b.push(b.shift()); break;
            case 'rr': 
              if (a.length > 1) a.push(a.shift());
              if (b.length > 1) b.push(b.shift());
              break;
            case 'rra': if (a.length > 1) a.unshift(a.pop()); break;
            case 'rrb': if (b.length > 1) b.unshift(b.pop()); break;
            case 'rrr': 
              if (a.length > 1) a.unshift(a.pop());
              if (b.length > 1) b.unshift(b.pop());
              break;
          }
          return { a, b };
        };

        const executeOperation = (op, recordHistory = true) => {
          const { a, b } = applyOpState(op, stackA(), stackB());
          
          if (JSON.stringify(a) === JSON.stringify(stackA()) && JSON.stringify(b) === JSON.stringify(stackB())) {
            return;
          }

          setStackA(a);
          setStackB(b);

          if (recordHistory) {
            const currentHist = history().slice(0, historyCursor());
            const newHist = [...currentHist, op];
            setHistory(newHist);
            setHistoryCursor(newHist.length);
          }
        };

        const handleUndo = () => {
          if (historyCursor() > 0) {
            const cursor = historyCursor() - 1;
            const opToRevert = history()[cursor];
            const inverseOp = getInverseOperation(opToRevert);
            
            const { a, b } = applyOpState(inverseOp, stackA(), stackB());
            setStackA(a);
            setStackB(b);
            setHistoryCursor(cursor);
          }
        };

        const handleRedo = () => {
          if (historyCursor() < history().length) {
            const opToApply = history()[historyCursor()];
            
            const { a, b } = applyOpState(opToApply, stackA(), stackB());
            setStackA(a);
            setStackB(b);
            setHistoryCursor(historyCursor() + 1);
          }
        };

        const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
        
        const runProgram = async () => {
          if (appState() === "ANIMATING") {
            setAppState("IDLE");
            return;
          }

          if (appState() === "COMPILING") return;

          setAppState("COMPILING");
          setExecutionError(null);
          termInstance.clear();

          try {
            setStatusMessage("Compiling...");
            termInstance.writeln("\x1b[34mCompiling and running...\x1b[0m\n");

            const stackArgs = stackA().map(String);
            const result = await compilerApi.compileAndRun(scriptCode(), stackArgs);

            if (result.error) {
              throw new Error(result.error);
            }

            const rawOutput = result.output || '';

            const operationsRaw = rawOutput.split('\n').map(s => s.trim()).filter(s => s !== '');
            const validOpsList = ['sa', 'sb', 'ss', 'pa', 'pb', 'ra', 'rb', 'rr', 'rra', 'rrb', 'rrr'];

            const opsToAnimate = [];
            for (let i = 0; i < operationsRaw.length; i++) {
                const op = operationsRaw[i];
                if (validOpsList.includes(op)) {
                    opsToAnimate.push(op);
                }
            }

            setAppState("ANIMATING");
            setStatusMessage(`Animating ${opsToAnimate.length} operations...`);
            termInstance.writeln(`\n\x1b[35m[Visualizer] Animating ${opsToAnimate.length} valid operations...\x1b[0m`);

            for (let i = 0; i < opsToAnimate.length; i++) {
              if (appState() !== "ANIMATING") break;

              executeOperation(opsToAnimate[i], true);
              const delay = opsToAnimate.length > 50 ? 5 : 150;
              await sleep(delay);
            }

            setAppState("IDLE");
            termInstance.writeln(`\x1b[32m[Visualizer] Finished.\x1b[0m`);
          } catch (err) {
            setExecutionError(err.message);
            termInstance.writeln(`\n\x1b[31m${err.message}\x1b[0m`);
            setAppState("IDLE");
          }
        };

        const resetToDefault = () => {
          if (confirm('Reset code to default? This will overwrite your current code.')) {
            setScriptCode(defaultCode);
            if (cmInstance) {
              cmInstance.dispatch({
                changes: { from: 0, to: cmInstance.state.doc.length, insert: defaultCode }
              });
            }
            try {
              localStorage.removeItem(LOCAL_STORAGE_KEY);
            } catch (e) {}
          }
        };

        const renderStackItem = (value) => {
          const maxVal = itemCount();
          const percentage = Math.max(10, (value / maxVal) * 100);
          
          return (
            <div class="w-full flex items-center justify-center mb-1 group stack-item relative">
              <div 
                class="bg-blue-500 rounded-sm h-6 sm:h-8 flex items-center justify-center text-white text-xs sm:text-sm font-bold border border-blue-600 shadow-sm"
                style={{ width: `${percentage}%` }}
              >
                {value}
              </div>
            </div>
          );
        };

        return (
          <div class="h-full flex flex-col overflow-hidden">
            
            {/* Header */}
            <header class="bg-[#18181b] border-b border-[#27272a] p-3 md:p-4 flex flex-wrap items-center justify-between shrink-0 gap-3">
              <div class="flex items-center space-x-3">
                <Icon name="swap-vert" color="3b82f6" size={28} />
                <h1 class="text-lg md:text-xl font-bold text-[#d4d4d8]">42 push_swap</h1>
              </div>
              <div class="flex items-center space-x-4">
                <div class="flex items-center space-x-2 bg-[#09090b] rounded-lg p-1 border border-[#27272a]">
                  <span class="text-xs md:text-sm text-[#a1a1aa] px-2">Elements:</span>
                  <input
                    type="number"
                    value={itemCount()}
                    onInput={(e) => setItemCount(e.target.value)}
                    min="1" max="1000"
                    class="w-14 md:w-16 bg-[#18181b] text-[#d4d4d8] rounded p-1 text-center border border-[#27272a] focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-sm"
                  />
                  <button
                    onClick={() => generateStacks()}
                    class="bg-blue-600 hover:bg-blue-500 text-white px-3 py-1 md:px-4 md:py-1.5 rounded text-xs md:text-sm font-medium transition-colors"
                  >
                    Generate
                  </button>
                  <button
                    onClick={shareCode}
                    class={`px-3 py-1 md:px-4 md:py-1.5 rounded text-xs md:text-sm font-medium transition-colors flex items-center space-x-1 ${shareStatus() === 'copied' ? 'bg-emerald-600 hover:bg-emerald-500 text-white' : 'bg-[#27272a] hover:bg-[#3f3f46] text-[#a1a1aa]'}`}
                    title={shareStatus() === 'copied' ? 'Link copied!' : 'Share Code'}
                  >
                    <Show when={shareStatus() === 'copied'} fallback={<Icon name="share" size={14} />}>
                      <Icon name="check" color="ffffff" size={14} />
                    </Show>
                    <span>{shareStatus() === 'copied' ? 'Copied!' : 'Share'}</span>
                  </button>
                </div>
              </div>
            </header>

            {/* Main Content Area */}
            <div class="flex-1 flex flex-col md:flex-row overflow-y-auto md:overflow-hidden bg-[#09090b]">
              
              {/* LEFT: Visualizer */}
              <div class="w-full md:w-1/3 h-[40vh] md:h-full flex flex-col border-b md:border-b-0 md:border-r border-[#27272a] bg-[#09090b] p-3 md:p-4 shrink-0">
                <div class="flex-1 flex space-x-4 overflow-hidden">
                  <div class="flex-1 flex flex-col bg-[#18181b] rounded-xl border border-[#27272a] overflow-hidden">
                    <div class="bg-[#1e3a8a] p-2 text-center border-b border-[#27272a] shrink-0">
                      <span class="font-bold text-[#93c5fd] text-sm md:text-base">Stack A</span>
                      <span class="text-xs text-[#a1a1aa] ml-1">({stackA().length})</span>
                    </div>
                    <div class="flex-1 overflow-y-auto p-2 flex flex-col justify-end pb-4">
                      <For each={stackA()}>{(item) => renderStackItem(item)}</For>
                    </div>
                  </div>
                  <div class="flex-1 flex flex-col bg-[#18181b] rounded-xl border border-[#27272a] overflow-hidden">
                    <div class="bg-[#27272a] p-2 text-center border-b border-[#27272a] shrink-0">
                      <span class="font-bold text-[#d4d4d8] text-sm md:text-base">Stack B</span>
                      <span class="text-xs text-[#a1a1aa] ml-1">({stackB().length})</span>
                    </div>
                    <div class="flex-1 overflow-y-auto p-2 flex flex-col justify-end pb-4">
                      <For each={stackB()}>{(item) => renderStackItem(item)}</For>
                    </div>
                  </div>
                </div>
              </div>

              {/* MIDDLE: Controls */}
              <div class="w-full md:w-1/4 h-[auto] md:h-full flex flex-col border-b md:border-b-0 md:border-r border-[#27272a] bg-[#18181b] p-3 md:p-4 shrink-0">
                <h2 class="text-xs md:text-sm font-semibold text-[#52525b] uppercase tracking-wider mb-3 md:mb-4 shrink-0">Manual Control</h2>
                <div class="grid grid-cols-3 gap-2 mb-4 md:mb-6 shrink-0">
                  <For each={OPERATIONS}>
                    {(op) => (
                      <button 
                        onClick={() => executeOperation(op.id)}
                        disabled={appState() !== "IDLE"}
                        class={`py-2 rounded-lg text-xs md:text-sm font-bold uppercase transition-transform active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed ${getBlockClass(op.type)}`}
                        title={op.desc}
                      >
                        {op.id}
                      </button>
                    )}
                  </For>
                </div>
                
                <div class="flex items-center justify-between mb-2 shrink-0">
                  <h3 class="text-[10px] md:text-xs font-semibold text-[#52525b] uppercase">History</h3>
                  <div class="flex space-x-1">
                    <button 
                      onClick={handleUndo} 
                      disabled={historyCursor() === 0 || appState() !== "IDLE"}
                      class="p-1 rounded bg-[#27272a] hover:bg-[#3f3f46] disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
                      title="Undo"
                    >
                      <Icon name="undo" size={16} />
                    </button>
                    <button 
                      onClick={handleRedo} 
                      disabled={historyCursor() === history().length || appState() !== "IDLE"}
                      class="p-1 rounded bg-[#27272a] hover:bg-[#3f3f46] disabled:opacity-30 disabled:cursor-not-allowed transition-colors"
                      title="Redo"
                    >
                      <Icon name="redo" size={16} />
                    </button>
                  </div>
                </div>
                
                {/* Fixed height on mobile for history so it doesn't grow infinitely */}
                <div class="h-[150px] md:h-auto md:flex-1 bg-[#09090b] rounded-lg border border-[#27272a] p-2 md:p-3 overflow-y-auto font-mono text-xs md:text-sm flex flex-col gap-1 shrink-0 md:shrink">
                  <Show when={history().length === 0}>
                    <span class="text-[#a1a1aa] italic text-center mt-4 text-xs">No operations executed.</span>
                  </Show>
                  <For each={history()}>
                    {(op, idx) => (
                      <div class={`flex items-center space-x-2 p-1 rounded ${idx() === historyCursor() - 1 ? 'bg-[#1e3a8a] text-[#93c5fd]' : idx() >= historyCursor() ? 'text-[#52525b] opacity-50' : 'text-[#d4d4d8]'}`}>
                        <span class="text-[10px] md:text-xs opacity-50 w-6 text-right">{idx() + 1}.</span>
                        <span class="font-bold uppercase">{op}</span>
                      </div>
                    )}
                  </For>
                </div>

                {/* Validation & Benchmark Status */}
                <div class="mt-4 p-3 bg-[#09090b] rounded-lg border border-[#27272a] flex flex-col gap-2 shrink-0">
                  <h3 class="text-[10px] md:text-xs font-semibold text-[#52525b] uppercase border-b border-[#27272a] pb-1">Validation & Benchmark</h3>
                  <div class="flex justify-between items-center text-sm mt-1">
                    <span class="text-[#a1a1aa]">Is Sorted?</span>
                    <span class={isSorted() ? "text-emerald-500 font-bold" : "text-red-500 font-bold"}>
                      {isSorted() ? "YES" : "NO"}
                    </span>
                  </div>
                  <div class="flex justify-between items-center text-sm">
                    <span class="text-[#a1a1aa]">Operations:</span>
                    <span class="text-[#d4d4d8] font-bold">{historyCursor()}</span>
                  </div>
                  <Show when={parseInt(itemCount(), 10) === 100 || parseInt(itemCount(), 10) === 500}>
                    <div class="flex justify-between items-center text-sm border-t border-[#27272a] pt-2 mt-1">
                      <span class="text-[#a1a1aa]">Score:</span>
                      <span class={`font-bold ${benchmarkStatus().class}`}>
                        {benchmarkStatus().label}
                      </span>
                    </div>
                  </Show>
                </div>
                
              </div>

              {/* RIGHT: Editor & Terminal */}
              <div class="w-full md:flex-1 h-[65vh] md:h-full flex flex-col bg-[#09090b] shrink-0 p-3 md:p-4 min-w-0">
                <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-3 gap-2 shrink-0">
                  <h2 class="text-xs md:text-sm font-semibold text-[#52525b] uppercase tracking-wider">C Program Editor</h2>
                  <div class="flex items-center space-x-3 self-end sm:self-auto">
                    
                    <Show when={appState() === "COMPILING"}>
                        <div class="flex items-center space-x-2 text-blue-400 text-xs font-semibold px-2">
                            <div class="spinner"></div>
                            <span>{statusMessage()}</span>
                        </div>
                    </Show>
                    
                    <button 
                      onClick={resetToDefault}
                      disabled={appState() === "COMPILING" || appState() === "ANIMATING"}
                      class="flex items-center space-x-1 px-3 py-1 md:px-4 md:py-1.5 rounded-md transition-colors text-xs md:text-sm font-semibold disabled:opacity-50 bg-[#27272a] hover:bg-[#3f3f46] text-[#d4d4d8]"
                      title="Reset to default code"
                    >
                      <Icon name="refresh" color="d4d4d8" size={16} />
                      <span>Reset</span>
                    </button>
                    
                    <button 
                      onClick={runProgram}
                      disabled={appState() === "COMPILING"}
                      class={`flex items-center space-x-1 px-3 py-1 md:px-4 md:py-1.5 rounded-md transition-colors text-xs md:text-sm font-semibold disabled:opacity-50 ${appState() === "ANIMATING" ? 'bg-orange-500 hover:bg-orange-600 text-white' : 'bg-emerald-600 hover:bg-emerald-500 text-white'}`}
                    >
                      <Icon name={appState() === "ANIMATING" ? "stop" : "play-arrow"} color="ffffff" size={16} />
                      <span>{appState() === "ANIMATING" ? "Stop Animation" : "Compile & Run"}</span>
                    </button>
                  </div>
                </div>

                {/* CodeMirror 6 Container */}
                <div class="flex-1 relative min-h-[250px] overflow-hidden border border-[#27272a] rounded-lg bg-[#1e1e1e]">
                  <div ref={codeEditorRef} class="absolute inset-0"></div>
                </div>

                {/* xterm.js Terminal Logs */}
                <div class="h-[200px] md:h-[30%] shrink-0 mt-3 flex flex-col pb-2 md:pb-0">
                  <h2 class="text-xs md:text-sm font-semibold text-[#52525b] uppercase tracking-wider mb-2">Terminal Logs</h2>
                  <div class="flex-1 relative overflow-hidden border border-[#27272a] rounded-lg bg-[#1e1e1e] p-2">
                    <div ref={terminalRef} class="absolute inset-0 p-1"></div>
                  </div>
                  {/* Scroll buttons for mobile */}
                  <div class="flex md:hidden mt-2 gap-2">
                    <button
                      onContextMenu={(e) => e.preventDefault()}
                      class="term-scroll-btn flex-1 flex items-center justify-center py-1 bg-transparent rounded-lg text-[#a1a1aa] transition-colors"
                      onMouseDown={() => {
                        if (!termInstance) return;
                        termInstance.scrollLines(-5);
                        const iv = setInterval(() => termInstance.scrollLines(-5), 80);
                        const stop = () => { clearInterval(iv); document.removeEventListener('mouseup', stop); document.removeEventListener('mouseleave', stop); };
                        document.addEventListener('mouseup', stop);
                        document.addEventListener('mouseleave', stop);
                      }}
                      onTouchStart={(e) => {
                        e.preventDefault();
                        if (!termInstance) return;
                        termInstance.scrollLines(-5);
                        const iv = setInterval(() => termInstance.scrollLines(-5), 80);
                        const stop = () => { clearInterval(iv); document.removeEventListener('touchend', stop); document.removeEventListener('touchcancel', stop); };
                        document.addEventListener('touchend', stop);
                        document.addEventListener('touchcancel', stop);
                      }}
                    >
                      <Icon name="keyboard-arrow-up" size={22} />
                    </button>
                    <button
                      onContextMenu={(e) => e.preventDefault()}
                      class="term-scroll-btn flex-1 flex items-center justify-center py-1 bg-transparent rounded-lg text-[#a1a1aa] transition-colors"
                      onMouseDown={() => {
                        if (!termInstance) return;
                        termInstance.scrollLines(5);
                        const iv = setInterval(() => termInstance.scrollLines(5), 80);
                        const stop = () => { clearInterval(iv); document.removeEventListener('mouseup', stop); document.removeEventListener('mouseleave', stop); };
                        document.addEventListener('mouseup', stop);
                        document.addEventListener('mouseleave', stop);
                      }}
                      onTouchStart={(e) => {
                        e.preventDefault();
                        if (!termInstance) return;
                        termInstance.scrollLines(5);
                        const iv = setInterval(() => termInstance.scrollLines(5), 80);
                        const stop = () => { clearInterval(iv); document.removeEventListener('touchend', stop); document.removeEventListener('touchcancel', stop); };
                        document.addEventListener('touchend', stop);
                        document.addEventListener('touchcancel', stop);
                      }}
                    >
                      <Icon name="keyboard-arrow-down" size={22} />
                    </button>
                  </div>
                </div>

              </div>
            </div>
          </div>
        );
      }

      render(() => <App />, document.getElementById("root"));
    </script>
  </body>
</html>
