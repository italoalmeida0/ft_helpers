<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>push_swap</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    <style>
        .sortable-ghost {
            opacity: 0.4;
            background-color: #cbd5e1;
        }
        .sortable-drag {
            cursor: grabbing !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .drag-item {
            cursor: grab;
        }
        .drag-item:active {
            cursor: grabbing;
        }
        /* Style for operation buttons */
        .btn-op {
            background-color: #f3f4f6;
            border: 1px solid #d1d5db;
            color: #374151;
            font-weight: 600;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }
        .btn-op:hover {
            background-color: #e5e7eb;
            border-color: #9ca3af;
        }
        .btn-op:active {
            background-color: #d1d5db;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8 text-indigo-600">push_swap</h1>

        <!-- Settings Section -->
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 mb-6 flex flex-col md:flex-row items-center justify-center gap-4">
            <input type="number" id="itemCountInput" min="1" max="100" value="10" 
                   class="border border-gray-300 rounded-lg px-4 py-2 w-24 text-center focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            
            <button id="generateButton" 
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-6 rounded-lg transition-colors shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                Gen
            </button>
        </div>

        <!-- Main Content Layout: Sidebar Operations + Main Stacks -->
        <div class="flex flex-col lg:flex-row gap-8">
            
            <!-- Left Column: Operations -->
            <div class="lg:w-1/4 flex flex-col">
                <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 sticky top-8">
                    <h2 class="text-lg font-bold text-gray-700 mb-6 text-center">Operações</h2>
                    
                    <div class="flex flex-col gap-5">
                        <!-- Swaps -->
                        <div class="flex flex-col gap-2">
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-wider text-center">Swaps</span>
                            <div class="grid grid-cols-3 gap-2">
                                <button class="btn-op text-sm px-2 py-1" id="btn-sa" title="Swap A: Swap first two elements of A">sa</button>
                                <button class="btn-op text-sm px-2 py-1" id="btn-sb" title="Swap B: Swap first two elements of B">sb</button>
                                <button class="btn-op text-sm px-2 py-1" id="btn-ss" title="Swap both">ss</button>
                            </div>
                        </div>
                        <!-- Pushes -->
                        <div class="flex flex-col gap-2">
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-wider text-center">Pushes</span>
                            <div class="grid grid-cols-2 gap-2 max-w-[200px] mx-auto w-full">
                                <button class="btn-op text-sm px-2 py-1" id="btn-pa" title="Push A: Take first from B, put on A">pa</button>
                                <button class="btn-op text-sm px-2 py-1" id="btn-pb" title="Push B: Take first from A, put on B">pb</button>
                            </div>
                        </div>
                        <!-- Rotates -->
                        <div class="flex flex-col gap-2">
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-wider text-center">Rotates</span>
                            <div class="grid grid-cols-3 gap-2">
                                <button class="btn-op text-sm px-2 py-1" id="btn-ra" title="Rotate A: Shift up all elements of A">ra</button>
                                <button class="btn-op text-sm px-2 py-1" id="btn-rb" title="Rotate B: Shift up all elements of B">rb</button>
                                <button class="btn-op text-sm px-2 py-1" id="btn-rr" title="Rotate both">rr</button>
                            </div>
                        </div>
                        <!-- Reverse Rotates -->
                        <div class="flex flex-col gap-2">
                            <span class="text-xs font-bold text-gray-400 uppercase tracking-wider text-center">Rev. Rotates</span>
                            <div class="grid grid-cols-3 gap-2">
                                <button class="btn-op text-sm px-2 py-1" id="btn-rra" title="Reverse Rotate A: Shift down all elements of A">rra</button>
                                <button class="btn-op text-sm px-2 py-1" id="btn-rrb" title="Reverse Rotate B: Shift down all elements of B">rrb</button>
                                <button class="btn-op text-sm px-2 py-1" id="btn-rrr" title="Reverse Rotate both">rrr</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Stacks -->
            <div class="lg:w-3/4 grid grid-cols-1 md:grid-cols-2 gap-6">
                
                <!-- Stack A Container -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col h-[600px]">
                    <div class="bg-indigo-50 rounded-t-xl p-4 border-b border-gray-200">
                        <h2 class="text-xl font-bold text-center text-indigo-800">Stack a</h2>
                    </div>
                    <ul id="stackA" class="flex-1 overflow-y-auto p-4 space-y-2 bg-gray-50/50"></ul>
                </div>

                <!-- Stack B Container -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 flex flex-col h-[600px]">
                    <div class="bg-emerald-50 rounded-t-xl p-4 border-b border-gray-200">
                        <h2 class="text-xl font-bold text-center text-emerald-800">Stack b</h2>
                    </div>
                    <ul id="stackB" class="flex-1 overflow-y-auto p-4 space-y-2 bg-gray-50/50"></ul>
                </div>

            </div>
        </div>
    </div>

    <script>
        // DOM Elements
        const inputElement = document.getElementById('itemCountInput');
        const generateButton = document.getElementById('generateButton');
        const containerStackA = document.getElementById('stackA');
        const containerStackB = document.getElementById('stackB');

        // Initialize Sortable logic (optional manual drag)
        new Sortable(containerStackA, {
            group: 'sharedStacks',
            animation: 150,
            ghostClass: 'sortable-ghost',
            dragClass: 'sortable-drag'
        });

        new Sortable(containerStackB, {
            group: 'sharedStacks',
            animation: 150,
            ghostClass: 'sortable-ghost',
            dragClass: 'sortable-drag'
        });

        // ---------------------------------------------------------
        // Core Logic for Item Generation
        // ---------------------------------------------------------
        function handleGenerateItems() {
            const countValueString = inputElement.value;
            const countValueNumber = parseInt(countValueString, 10);

            if (isNaN(countValueNumber) || countValueNumber <= 0) return;

            containerStackA.innerHTML = '';
            containerStackB.innerHTML = '';

            const sequenceArray = [];
            for (let index = 1; index <= countValueNumber; index++) {
                sequenceArray.push(index);
            }

            // Shuffle array (Fisher-Yates)
            for (let currentIndex = sequenceArray.length - 1; currentIndex > 0; currentIndex--) {
                const randomIndex = Math.floor(Math.random() * (currentIndex + 1));
                const temporaryValue = sequenceArray[currentIndex];
                sequenceArray[currentIndex] = sequenceArray[randomIndex];
                sequenceArray[randomIndex] = temporaryValue;
            }

            // Append HTML elements
            sequenceArray.forEach(function(numberValue) {
                const listItem = document.createElement('li');
                listItem.className = 'drag-item bg-white border border-gray-300 rounded-lg py-3 px-4 shadow-sm flex justify-center items-center hover:bg-indigo-50 hover:border-indigo-300 transition-colors group';
                
                const numberTextElement = document.createElement('span');
                numberTextElement.className = 'text-xl font-black text-gray-700';
                numberTextElement.textContent = numberValue;
                
                listItem.appendChild(numberTextElement);
                containerStackA.appendChild(listItem);
            });
        }

        // ---------------------------------------------------------
        // Push_swap Operations implementation
        // ---------------------------------------------------------

        // Swap: Swap the first two elements at the top of stack
        function handleSwap(containerElement) {
            if (containerElement.children.length >= 2) {
                const firstChild = containerElement.children[0];
                const secondChild = containerElement.children[1];
                // Insert the second child before the first one
                containerElement.insertBefore(secondChild, firstChild);
            }
        }

        // Push: Take the first element at the top of source and put it at the top of destination
        function handlePush(sourceContainer, destinationContainer) {
            if (sourceContainer.children.length > 0) {
                const topElement = sourceContainer.children[0];
                // Insert before the current first child, or just append if empty
                if (destinationContainer.firstChild) {
                    destinationContainer.insertBefore(topElement, destinationContainer.firstChild);
                } else {
                    destinationContainer.appendChild(topElement);
                }
            }
        }

        // Rotate: Shift up all elements by one (first becomes last)
        function handleRotate(containerElement) {
            if (containerElement.children.length > 1) {
                const firstChild = containerElement.children[0];
                containerElement.appendChild(firstChild);
            }
        }

        // Reverse Rotate: Shift down all elements by one (last becomes first)
        function handleReverseRotate(containerElement) {
            if (containerElement.children.length > 1) {
                const lastChild = containerElement.lastElementChild;
                containerElement.insertBefore(lastChild, containerElement.firstChild);
            }
        }

        // ---------------------------------------------------------
        // Event Listeners for Buttons
        // ---------------------------------------------------------
        generateButton.addEventListener('click', handleGenerateItems);

        // Swap Operations
        document.getElementById('btn-sa').addEventListener('click', () => handleSwap(containerStackA));
        document.getElementById('btn-sb').addEventListener('click', () => handleSwap(containerStackB));
        document.getElementById('btn-ss').addEventListener('click', () => {
            handleSwap(containerStackA);
            handleSwap(containerStackB);
        });

        // Push Operations
        document.getElementById('btn-pa').addEventListener('click', () => handlePush(containerStackB, containerStackA));
        document.getElementById('btn-pb').addEventListener('click', () => handlePush(containerStackA, containerStackB));

        // Rotate Operations
        document.getElementById('btn-ra').addEventListener('click', () => handleRotate(containerStackA));
        document.getElementById('btn-rb').addEventListener('click', () => handleRotate(containerStackB));
        document.getElementById('btn-rr').addEventListener('click', () => {
            handleRotate(containerStackA);
            handleRotate(containerStackB);
        });

        // Reverse Rotate Operations
        document.getElementById('btn-rra').addEventListener('click', () => handleReverseRotate(containerStackA));
        document.getElementById('btn-rrb').addEventListener('click', () => handleReverseRotate(containerStackB));
        document.getElementById('btn-rrr').addEventListener('click', () => {
            handleReverseRotate(containerStackA);
            handleReverseRotate(containerStackB);
        });

        // Generate the initial state on page load
        window.addEventListener('DOMContentLoaded', handleGenerateItems);
    </script>
</body>
</html>
